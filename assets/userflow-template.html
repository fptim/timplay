<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>유저플로우</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{font-family:Inter,system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif}
  .node{position:absolute;user-select:none;cursor:grab;border-radius:.6rem;padding:.55rem .9rem;
    font-size:.82rem;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.06);z-index:2}
  .node.sel{outline:2px solid #7c3aed;outline-offset:2px}
  .n-start{background:#27272a;color:#fff}
  .n-sectionTop{background:#7c3aed;color:#fff}
  .n-page{background:#ede9fe;color:#4c1d95}
  .n-action{background:#fff;border:1px solid #d4d4d8;color:#3f3f46;border-radius:9999px}
  .band-label{position:absolute;left:12px;font-size:.8rem;color:#52525b;z-index:1}
  .lg{display:inline-flex;align-items:center;gap:.35rem;font-size:.72rem;color:#52525b}
  .sw{width:.85rem;height:.85rem;border-radius:.25rem}
  .del-x{opacity:0;transition:.1s;color:#a1a1aa;cursor:pointer;font-size:.8rem;line-height:1;padding:0 .15rem}
  .group:hover .del-x{opacity:1}
  .del-x:hover{color:#dc2626}
  .band-label .del-x:hover{color:#dc2626}
  .node-btn{position:absolute;top:-9px;right:-9px;width:18px;height:18px;border-radius:9999px;background:#fff;
    border:1px solid #d4d4d8;color:#71717a;font-size:10px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;opacity:0;transition:.1s;z-index:4}
  .node:hover .node-btn{opacity:1}
  .node-btn.linked{background:#7c3aed;color:#fff;border-color:#7c3aed;opacity:1}
  .node-btn:not(.linked):hover{border-color:#7c3aed;color:#7c3aed}
  #fpanel{transform:translateX(100%);transition:transform .18s ease}
  #fpanel.open{transform:translateX(0)}
  .fld{width:100%;border:1px solid #e4e4e7;border-radius:.5rem;padding:.35rem .55rem;font-size:.85rem;background:#fff;color:#18181b}
  .fld:focus{outline:none;border-color:#a78bfa;box-shadow:0 0 0 3px #ede9fe}
</style>
</head>
<body class="bg-zinc-50 text-zinc-900">
<header class="h-14 border-b border-zinc-200 bg-white flex items-center px-4 gap-3 sticky top-0 z-20">
  <span class="w-6 h-6 rounded bg-violet-600"></span>
  <span id="pname" class="font-medium truncate"></span>
  <nav class="ml-3 flex items-center gap-1 text-sm text-zinc-400">
    <a href="prd.md" class="px-2 py-1 rounded hover:bg-zinc-100">PRD</a><span>·</span>
    <a href="features.html" class="px-2 py-1 rounded hover:bg-zinc-100">기능명세서</a><span>·</span>
    <a href="userflow.html" class="px-2 py-1 rounded bg-zinc-100 text-zinc-900 font-medium">유저플로우</a><span>·</span>
    <a href="wireframe.html" class="px-2 py-1 rounded hover:bg-zinc-100">와이어프레임</a>
  </nav>
  <div class="ml-auto flex items-center gap-2">
    <input id="file" type="file" accept="application/json" class="hidden">
    <button id="import" class="text-sm px-3 py-1.5 rounded-md border border-zinc-200 hover:bg-zinc-50">불러오기</button>
    <button id="export" class="text-sm px-3 py-1.5 rounded-md bg-violet-600 text-white hover:bg-violet-700">내보내기</button>
  </div>
</header>

<div class="flex h-[calc(100vh-3.5rem)]">
  <!-- canvas -->
  <div class="flex-1 flex flex-col">
    <!-- toolbar + legend -->
    <div class="h-12 border-b border-zinc-200 bg-white flex items-center px-4 gap-2 text-sm">
      <button data-add="page" class="addbtn px-2 py-1 rounded border border-zinc-200 hover:bg-zinc-50">+ 페이지</button>
      <button data-add="sectionTop" class="addbtn px-2 py-1 rounded border border-zinc-200 hover:bg-zinc-50">+ 섹션최상위</button>
      <button data-add="action" class="addbtn px-2 py-1 rounded border border-zinc-200 hover:bg-zinc-50">+ 행동</button>
      <button id="addSection" class="px-2 py-1 rounded border border-zinc-200 hover:bg-zinc-50">+ 섹션</button>
      <button id="linkMode" class="px-2 py-1 rounded border border-zinc-200 hover:bg-zinc-50">연결 모드</button>
      <button id="del" class="px-2 py-1 rounded border border-zinc-200 hover:bg-zinc-50 text-red-600">선택 삭제</button>
      <div class="ml-auto flex items-center gap-3">
        <span class="lg"><span class="sw" style="background:#27272a"></span>시작</span>
        <span class="lg"><span class="sw" style="background:#7c3aed"></span>섹션 최상위 페이지</span>
        <span class="lg"><span class="sw" style="background:#ede9fe"></span>페이지</span>
        <span class="lg"><span class="sw rounded-full border border-zinc-300 bg-white"></span>행동</span>
        <span class="lg"><span style="color:#a1a1aa">→</span>유저 흐름</span>
      </div>
    </div>
    <div id="canvasWrap" class="flex-1 overflow-auto relative bg-zinc-50">
      <div id="canvas" class="relative" style="width:1800px;height:1200px">
        <svg id="edges" class="absolute inset-0 w-full h-full" style="z-index:1;pointer-events:none">
          <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="#a1a1aa"></path></marker>
          <marker id="arrowSel" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
            <path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"></path></marker></defs>
        </svg>
      </div>
    </div>
  </div>
  <!-- version rail -->
  <aside class="w-64 border-l border-zinc-200 bg-white p-4 overflow-auto">
    <h2 class="text-sm font-medium mb-3">유저플로우</h2>
    <button id="newVersion" class="w-full mb-3 text-sm px-3 py-2 rounded-md border border-zinc-200 hover:bg-zinc-50">✦ 새 유저 플로우</button>
    <ul id="versions" class="space-y-1"></ul>
    <p id="hint" class="mt-4 text-xs text-zinc-400 leading-relaxed">노드를 드래그해 이동 · 더블클릭해 이름 변경 · 노드 위 ✎ 버튼으로 기능/상세기능 상세 보기·편집 · '연결 모드'에서 두 노드를 차례로 클릭해 흐름 연결 · 연결선을 클릭하면 빨갛게 선택되고 ✕(또는 Delete 키)로 삭제 · 섹션/버전은 마우스를 올리면 ✕</p>
  </aside>
</div>

<!-- node → feature/spec detail drawer -->
<div id="fpanel" class="fixed top-14 right-0 bottom-0 w-[380px] bg-white border-l border-zinc-200 shadow-xl overflow-auto z-30">
  <div class="flex items-center justify-between h-12 px-4 border-b border-zinc-100 sticky top-0 bg-white">
    <span class="text-sm font-medium">기능 / 상세 기능</span>
    <button id="fp-close" class="text-zinc-400 hover:text-zinc-900 text-sm">✕</button>
  </div>
  <div id="fp-body" class="p-5"></div>
</div>

<script>
const PROJECT=__TIMPLAY_DATA__;
const $=(s,r=document)=>r.querySelector(s);
const uf=PROJECT.userflow;
$("#pname").textContent=(PROJECT.meta&&PROJECT.meta.productName)||"유저플로우";
let activeId=uf.activeVersionId||uf.versions[0]?.id;
let selNode=null, selEdge=null, linking=false, linkFrom=null;
const BAND_H=220;

const ver=()=>uf.versions.find(v=>v.id===activeId);
const canvas=$("#canvas"), svg=$("#edges");

function render(){
  renderVersions();
  const v=ver(); if(!v)return;
  // bands
  canvas.querySelectorAll(".band,.band-label,.node").forEach(e=>e.remove());
  (v.sections||[]).sort((a,b)=>a.order-b.order).forEach((s,i)=>{
    const band=document.createElement("div");
    band.className="band absolute left-0 right-0 border-b border-zinc-200";
    band.style.top=(i*BAND_H)+"px"; band.style.height=BAND_H+"px";
    band.style.background=i%2?"#fafafa":"#f4f4f5"; band.style.zIndex=0;
    canvas.appendChild(band);
    const lbl=document.createElement("div");
    lbl.className="band-label group flex items-center gap-1"; lbl.style.top=(i*BAND_H+10)+"px";
    lbl.innerHTML=`<span class="sec-title">${esc(s.title)}</span><span class="del-x" title="섹션 삭제">✕</span>`;
    lbl.querySelector(".sec-title").ondblclick=()=>{const n=prompt("섹션 이름",s.title);if(n){s.title=n;persist();render();}};
    lbl.querySelector(".del-x").onclick=e=>{e.stopPropagation();delSection(s);};
    canvas.appendChild(lbl);
  });
  const need=(v.sections?.length||1)*BAND_H+80;
  canvas.style.height=Math.max(1200,need)+"px";
  // nodes
  v.nodes.forEach(n=>{
    const el=document.createElement("div");
    el.className="node n-"+n.type+(n.id===selNode?" sel":"");
    el.style.left=n.x+"px"; el.style.top=n.y+"px";
    el.textContent=n.label; el.dataset.id=n.id;
    el.onmousedown=e=>startDrag(e,n,el);
    el.ondblclick=()=>{const t=prompt("노드 이름",n.label);if(t){n.label=t;persist();render();}};
    el.onclick=e=>{e.stopPropagation();onNodeClick(n);};
    if(n.type!=='start'){           // detail button: open the linked feature/spec editor
      const btn=document.createElement("span");
      btn.className="node-btn"+(n.ref?" linked":"");
      btn.textContent=n.ref?"✓":"✎";
      btn.title=n.ref?"연결된 기능 상세 편집":"기능/상세기능 연결 및 편집";
      btn.onmousedown=e=>e.stopPropagation();
      btn.onclick=e=>{e.stopPropagation();openPanel(n);};
      el.appendChild(btn);
    }
    canvas.appendChild(el);
  });
  drawEdges();
}

function drawEdges(){
  const v=ver();
  [...svg.querySelectorAll("path.edge")].forEach(p=>p.remove());
  const pos={};
  canvas.querySelectorAll(".node").forEach(el=>{
    pos[el.dataset.id]={x:el.offsetLeft,y:el.offsetTop,w:el.offsetWidth,h:el.offsetHeight};
  });
  const NS="http://www.w3.org/2000/svg";
  v.edges.forEach(e=>{
    const a=pos[e.from],b=pos[e.to]; if(!a||!b)return;
    const x1=a.x+a.w,y1=a.y+a.h/2,x2=b.x,y2=b.y+b.h/2;
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const d=`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
    const isSel=selEdge===e.id;
    const p=document.createElementNS(NS,"path");
    p.setAttribute("class","edge");
    p.setAttribute("d",d);
    p.setAttribute("fill","none"); p.setAttribute("stroke",isSel?"#dc2626":"#a1a1aa"); p.setAttribute("stroke-width",isSel?"2":"1.5");
    p.setAttribute("marker-end",isSel?"url(#arrowSel)":"url(#arrow)");
    svg.appendChild(p);
    // wide invisible hit area to make the thin line clickable
    const hit=document.createElementNS(NS,"path");
    hit.setAttribute("class","edge"); hit.setAttribute("d",d);
    hit.setAttribute("fill","none"); hit.setAttribute("stroke","transparent"); hit.setAttribute("stroke-width","14");
    hit.style.pointerEvents="stroke"; hit.style.cursor="pointer";
    hit.onclick=ev=>{ev.stopPropagation();selEdge=e.id;selNode=null;render();};
    svg.appendChild(hit);
    if(isSel){ // delete button at midpoint
      const g=document.createElementNS(NS,"g"); g.setAttribute("class","edge"); g.style.cursor="pointer"; g.style.pointerEvents="all";
      const c=document.createElementNS(NS,"circle");
      c.setAttribute("cx",mx);c.setAttribute("cy",my);c.setAttribute("r","9");c.setAttribute("fill","#dc2626");
      const t=document.createElementNS(NS,"text");
      t.setAttribute("x",mx);t.setAttribute("y",my+1);t.setAttribute("text-anchor","middle");t.setAttribute("dominant-baseline","middle");
      t.setAttribute("fill","#fff");t.setAttribute("font-size","11");t.textContent="✕";
      g.appendChild(c);g.appendChild(t);
      g.onclick=ev=>{ev.stopPropagation();delEdge(e.id);};
      svg.appendChild(g);
    }
  });
}

function startDrag(e,n,el){
  if(linking)return;
  e.preventDefault();
  selNode=n.id; selEdge=null; el.classList.add("sel");
  const sx=e.clientX,sy=e.clientY,ox=n.x,oy=n.y;
  const move=ev=>{n.x=Math.max(0,ox+ev.clientX-sx);n.y=Math.max(0,oy+ev.clientY-sy);
    el.style.left=n.x+"px";el.style.top=n.y+"px";drawEdges();};
  const up=()=>{document.removeEventListener("mousemove",move);document.removeEventListener("mouseup",up);persist();};
  document.addEventListener("mousemove",move);document.addEventListener("mouseup",up);
}

function onNodeClick(n){
  if(linking){
    if(!linkFrom){linkFrom=n.id;$("#hint").textContent="대상 노드를 클릭하세요.";}
    else if(linkFrom!==n.id){
      ver().edges.push({id:"e-"+(++idc).toString(36),from:linkFrom,to:n.id});
      linkFrom=null;linking=false;$("#linkMode").classList.remove("bg-violet-100");
      persist();render();
    }
  } else { selNode=n.id; selEdge=null; render(); }
}

function renderVersions(){
  const ul=$("#versions"); ul.innerHTML="";
  uf.versions.forEach(v=>{
    const li=document.createElement("li");
    li.className="group px-3 py-2 rounded-md border text-sm cursor-pointer "+(v.id===activeId?"border-violet-300 bg-violet-50":"border-transparent hover:bg-zinc-50");
    li.innerHTML=`<div class="flex items-center gap-1">
        <span class="ver-name font-medium truncate flex-1">${esc(v.name)}</span>
        <span class="ver-edit del-x" title="이름 변경">✎</span>
        <span class="ver-del del-x" title="버전 삭제">✕</span>
      </div>
      <div class="text-xs text-zinc-400">${esc(v.createdAt||"")}</div>`;
    li.onclick=()=>{activeId=v.id;uf.activeVersionId=v.id;selNode=null;selEdge=null;persist();render();};
    li.querySelector(".ver-edit").onclick=e=>{e.stopPropagation();const n=prompt("유저플로우 이름",v.name);if(n){v.name=n;persist();render();}};
    li.querySelector(".ver-del").onclick=e=>{e.stopPropagation();delVersion(v);};
    ul.appendChild(li);
  });
}

let idc=Date.now();
document.querySelectorAll(".addbtn").forEach(b=>b.onclick=()=>{
  const v=ver(); const type=b.dataset.add;
  const k=v.nodes.length%6;                          // cascade so adds don't stack exactly
  const id="n-"+(++idc).toString(36);
  v.nodes.push({id,type,label:({page:"새 페이지",sectionTop:"새 섹션 페이지",action:"새 행동"})[type],sectionId:v.sections[0]?.id||null,x:560+k*28,y:60+k*28});
  selNode=id;selEdge=null;persist();render();
});
$("#addSection").onclick=()=>{const v=ver();v.sections=v.sections||[];v.sections.push({id:"sec-"+(++idc).toString(36),title:"새 섹션",order:v.sections.length});persist();render();};
$("#linkMode").onclick=()=>{linking=!linking;linkFrom=null;$("#linkMode").classList.toggle("bg-violet-100",linking);$("#hint").textContent=linking?"연결 시작 노드를 클릭하세요.":"";};
function delNode(){if(!selNode)return;const v=ver();v.nodes=v.nodes.filter(n=>n.id!==selNode);v.edges=v.edges.filter(e=>e.from!==selNode&&e.to!==selNode);selNode=null;persist();render();}
function delEdge(id){const v=ver();v.edges=v.edges.filter(e=>e.id!==id);if(selEdge===id)selEdge=null;persist();render();}
function delSection(s){const v=ver();const used=v.nodes.filter(n=>n.sectionId===s.id).length;
  if(used && !confirm(`'${s.title}' 섹션을 삭제할까요? 이 섹션의 노드 ${used}개는 남고 섹션 지정만 해제됩니다.`))return;
  v.sections=v.sections.filter(x=>x.id!==s.id);
  v.sections.forEach((x,i)=>x.order=i);
  v.nodes.forEach(n=>{if(n.sectionId===s.id)n.sectionId=null;});
  persist();render();}
function delVersion(v){
  if(uf.versions.length<=1){alert("최소 1개의 유저플로우는 있어야 합니다.");return;}
  if(!confirm(`'${v.name}' 유저플로우를 삭제할까요?`))return;
  uf.versions=uf.versions.filter(x=>x.id!==v.id);
  if(activeId===v.id){activeId=uf.versions[0].id;uf.activeVersionId=activeId;selNode=null;selEdge=null;}
  persist();render();}
$("#del").onclick=()=>{if(selEdge)delEdge(selEdge);else delNode();};
document.addEventListener("keydown",e=>{
  if((e.key==="Delete"||e.key==="Backspace")&&(selNode||selEdge)){
    const t=e.target.tagName; if(t==="INPUT"||t==="TEXTAREA")return;
    e.preventDefault(); if(selEdge)delEdge(selEdge); else delNode();
  }});
$("#newVersion").onclick=()=>{const base=ver();const id="uf-"+(++idc).toString(36);
  uf.versions.push({id,name:"새 유저플로우 "+(uf.versions.length+1),createdAt:(PROJECT.meta&&PROJECT.meta.updatedAt)||"",parentId:null,sections:JSON.parse(JSON.stringify(base?.sections||[])),nodes:[],edges:[]});
  activeId=id;uf.activeVersionId=id;persist();render();};
canvas.onclick=()=>{if(!linking){selNode=null;selEdge=null;render();}};
function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- node → feature/spec detail drawer (edits sync to 기능명세서) ---------- */
let fpanelOpen=false, panelNodeId=null;
const fpanel=$("#fpanel");
$("#fp-close").onclick=closePanel;
const feats=()=>(PROJECT.features&&PROJECT.features.requirements)||[];
const prdRoles=()=>(PROJECT.prd&&PROJECT.prd.attributes&&PROJECT.prd.attributes.roles)||[];
const STAT={todo:'시작전',doing:'진행중',done:'완료'}, IMPV={low:'낮음',medium:'보통',high:'높음'};
const optTags=(map,cur)=>Object.entries(map).map(([v,t])=>`<option value="${v}" ${v===cur?'selected':''}>${t}</option>`).join("");
const roleTags=cur=>`<option value="">(없음)</option>`+prdRoles().map(r=>`<option value="${r.id}" ${r.id===cur?'selected':''}>${esc(r.name)}</option>`).join("");
function findRef(ref){
  if(!ref)return null;
  for(const r of feats())for(const f of r.features){
    if(ref.type==='feature'&&f.id===ref.id)return {req:r,feat:f};
    if(ref.type==='spec'){const s=f.specs.find(x=>x.id===ref.id);if(s)return {req:r,feat:f,spec:s};}
  }
  return null;
}
const panelNode=()=>ver()?.nodes.find(n=>n.id===panelNodeId);
function openPanel(n){panelNodeId=n.id;fpanelOpen=true;fpanel.classList.add("open");renderPanel();}
function closePanel(){fpanelOpen=false;fpanel.classList.remove("open");}
function linkSelect(node){
  let h=`<select id="fp-link" class="fld mb-3"><option value="">(연결 안 됨)</option>`;
  for(const r of feats()){
    h+=`<optgroup label="${esc(r.title)}">`;
    for(const f of r.features){
      h+=`<option value="feature:${f.id}" ${node.ref&&node.ref.type==='feature'&&node.ref.id===f.id?'selected':''}>기능 · ${esc(f.title)}</option>`;
      for(const s of f.specs)h+=`<option value="spec:${s.id}" ${node.ref&&node.ref.type==='spec'&&node.ref.id===s.id?'selected':''}>　— 상세 · ${esc(s.title)}</option>`;
    }
    h+=`</optgroup>`;
  }
  return h+`</select>`;
}
function renderPanel(){
  const body=$("#fp-body"); const node=panelNode(); if(!node){closePanel();return;}
  if(!feats().length){
    body.innerHTML=`<p class="text-sm text-zinc-500 leading-relaxed">기능명세서가 비어 있습니다.<br>먼저 <a href="features.html" class="text-violet-600 underline">기능명세서</a>에서 기능을 추가하면 노드에 연결할 수 있습니다.</p>`;
    return;
  }
  const found=findRef(node.ref);
  body.innerHTML=`
    <div class="text-xs text-zinc-400 mb-1">노드</div>
    <div class="text-sm font-medium mb-3 truncate">${esc(node.label)}</div>
    <div class="text-xs text-zinc-400 mb-1">연결된 기능 / 상세 기능</div>
    ${linkSelect(node)}
    <button id="fp-new" class="text-xs text-violet-600 hover:underline mb-2">+ '${esc(node.label)}' 이름으로 기능 새로 만들기</button>
    <div id="fp-detail"></div>`;
  $("#fp-link").onchange=e=>{const v=e.target.value;node.ref=v?{type:v.split(":")[0],id:v.split(":")[1]}:null;persist();render();renderPanel();};
  $("#fp-new").onclick=()=>{const req=feats()[0];const id="F-"+(++idc).toString(36);
    req.features.push({id,title:node.label||"새 기능",order:req.features.length,roleId:prdRoles()[0]?.id||null,status:"todo",importance:"medium",description:"",acceptanceCriteria:[],specs:[]});
    node.ref={type:'feature',id};persist();render();renderPanel();};
  const d=$("#fp-detail");
  if(!found){d.innerHTML=`<p class="text-sm text-zinc-400 mt-2 leading-relaxed">위에서 기능/상세기능을 선택하면 여기서 바로 보고 편집할 수 있습니다. 편집 내용은 기능명세서에도 함께 반영됩니다.</p>`;return;}
  if(found.spec)renderSpecPanel(d,found); else renderFeatPanel(d,found);
}
function renderFeatPanel(d,{feat:f}){
  d.innerHTML=`
    <hr class="my-3 border-zinc-100">
    <input id="p-title" class="fld text-base font-semibold mb-3" value="${esc(f.title)}">
    <div class="grid grid-cols-[56px_1fr] gap-x-2 gap-y-2 text-sm items-center mb-4">
      <label class="text-zinc-400">ID</label><div class="text-zinc-500 text-xs">${f.id}</div>
      <label class="text-zinc-400">역할</label><select id="p-role" class="fld">${roleTags(f.roleId)}</select>
      <label class="text-zinc-400">상태</label><select id="p-status" class="fld">${optTags(STAT,f.status||'todo')}</select>
      <label class="text-zinc-400">중요도</label><select id="p-imp" class="fld">${optTags(IMPV,f.importance||'medium')}</select>
    </div>
    <div class="text-sm text-zinc-400 mb-1">설명</div>
    <textarea id="p-desc" rows="3" class="fld mb-4">${esc(f.description||"")}</textarea>
    <div class="flex items-center justify-between mb-1"><span class="text-sm text-zinc-400">수용 기준</span><button id="p-add-ac" class="text-xs text-violet-600 hover:underline">+ 추가</button></div>
    <ul id="p-ac" class="space-y-1.5"></ul>
    <a href="features.html" class="inline-block mt-4 text-xs text-zinc-400 hover:text-violet-600">기능명세서에서 전체 보기 →</a>`;
  $("#p-title").oninput=e=>{f.title=e.target.value;persist();};
  $("#p-role").onchange=e=>{f.roleId=e.target.value||null;persist();};
  $("#p-status").onchange=e=>{f.status=e.target.value;persist();};
  $("#p-imp").onchange=e=>{f.importance=e.target.value;persist();};
  $("#p-desc").oninput=e=>{f.description=e.target.value;persist();};
  $("#p-add-ac").onclick=()=>{f.acceptanceCriteria=f.acceptanceCriteria||[];f.acceptanceCriteria.push({text:"",done:false});persist();renderAc(f);const a=$("#p-ac").querySelectorAll(".ac-text");a[a.length-1]?.focus();};
  renderAc(f);
}
function renderAc(f){
  const ul=$("#p-ac"); if(!ul)return; ul.innerHTML="";
  (f.acceptanceCriteria||[]).forEach((c,i)=>{
    const li=document.createElement("li"); li.className="flex items-start gap-2 text-sm border border-zinc-100 rounded px-2 py-1";
    li.innerHTML=`<input type="checkbox" ${c.done?'checked':''} class="mt-1.5 ac-done">
      <input class="ac-text fld border-0 px-1 ${c.done?'line-through text-zinc-400':''}" value="${esc(c.text)}" placeholder="수용 기준">
      <span class="del-x" style="opacity:1">✕</span>`;
    li.querySelector(".ac-done").onchange=e=>{c.done=e.target.checked;persist();renderAc(f);};
    li.querySelector(".ac-text").oninput=e=>{c.text=e.target.value;persist();};
    li.querySelector(".del-x").onclick=()=>{f.acceptanceCriteria.splice(i,1);persist();renderAc(f);};
    ul.appendChild(li);
  });
  if(!(f.acceptanceCriteria||[]).length)ul.innerHTML='<li class="text-xs text-zinc-400">없음</li>';
}
function renderSpecPanel(d,{feat:f,spec:s}){
  d.innerHTML=`
    <hr class="my-3 border-zinc-100">
    <div class="text-xs text-zinc-400 mb-1">상위 기능 · ${esc(f.title)}</div>
    <input id="p-title" class="fld text-base font-semibold mb-3" value="${esc(s.title)}">
    <div class="grid grid-cols-[56px_1fr] gap-x-2 gap-y-2 text-sm items-center mb-4"><label class="text-zinc-400">ID</label><div class="text-zinc-500 text-xs">${s.id}</div></div>
    <div class="text-sm text-zinc-400 mb-1">상세 명세</div>
    <textarea id="p-desc" rows="5" class="fld">${esc(s.description||"")}</textarea>
    <a href="features.html" class="inline-block mt-4 text-xs text-zinc-400 hover:text-violet-600">기능명세서에서 전체 보기 →</a>`;
  $("#p-title").oninput=e=>{s.title=e.target.value;persist();};
  $("#p-desc").oninput=e=>{s.description=e.target.value;persist();};
}

const LS="timplay:project:"+((PROJECT.meta&&PROJECT.meta.slug)||"default");
function persist(){try{localStorage.setItem(LS,JSON.stringify(PROJECT));}catch(e){}}
function syncFromShared(o){ // replace each stage's contents in place (keeps `uf` alias valid)
  if(!o)return false;
  for(const k of ['meta','prd','features','userflow','wireframe']){
    if(o[k]==null)continue;
    const cur=PROJECT[k];
    if(cur&&typeof cur==='object'&&!Array.isArray(cur)){for(const kk of Object.keys(cur))delete cur[kk];Object.assign(cur,o[k]);}
    else PROJECT[k]=o[k];
  }
  if(!ver())activeId=uf.versions[0]?.id; uf.activeVersionId=activeId;
  return true;
}
(function restore(){try{const s=localStorage.getItem(LS);if(s)syncFromShared(JSON.parse(s));}catch(e){}})();
window.addEventListener("storage",e=>{ // another timplay page (e.g. 기능명세서) changed the project
  if(e.key!==LS||!e.newValue)return;
  try{syncFromShared(JSON.parse(e.newValue));render();if(fpanelOpen)renderPanel();}catch(err){}
});
$("#export").onclick=()=>{const blob=new Blob([JSON.stringify(PROJECT,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=((PROJECT.meta&&PROJECT.meta.slug)||"project")+".json";a.click();};
$("#import").onclick=()=>$("#file").click();
$("#file").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const o=JSON.parse(r.result);Object.assign(PROJECT,o);if(o.userflow){uf.versions=o.userflow.versions;uf.activeVersionId=o.userflow.activeVersionId;activeId=uf.activeVersionId||uf.versions[0]?.id;}persist();render();}catch(err){alert("JSON 파싱 실패: "+err.message);}};
  r.readAsText(f);};

render();
</script>
</body>
</html>
