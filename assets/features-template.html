<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>기능명세서</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
  body{font-family:Inter,system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif}
  .badge{display:inline-flex;align-items:center;justify-content:center;min-width:1.25rem;height:1.25rem;
    font-size:.7rem;border-radius:9999px;background:#f4f4f5;color:#71717a;padding:0 .35rem}
  .row{cursor:pointer}
  .row.sel{background:#f5f3ff}
  .grab{cursor:grab}
  .chev{transition:transform .15s}
  .chev.open{transform:rotate(90deg)}
</style>
</head>
<body class="bg-zinc-50 text-zinc-900">
<!-- top bar -->
<header class="h-14 border-b border-zinc-200 bg-white flex items-center px-4 gap-3 sticky top-0 z-10">
  <span class="w-6 h-6 rounded bg-violet-600"></span>
  <span id="pname" class="font-medium truncate"></span>
  <nav class="ml-3 flex items-center gap-1 text-sm text-zinc-400">
    <a href="prd.md" class="px-2 py-1 rounded hover:bg-zinc-100">PRD</a><span>·</span>
    <a href="features.html" class="px-2 py-1 rounded bg-zinc-100 text-zinc-900 font-medium">기능명세서</a><span>·</span>
    <a href="userflow.html" class="px-2 py-1 rounded hover:bg-zinc-100">유저플로우</a><span>·</span>
    <a href="wireframe.html" class="px-2 py-1 rounded hover:bg-zinc-100">와이어프레임</a>
  </nav>
  <div class="ml-auto flex items-center gap-2">
    <input id="file" type="file" accept="application/json" class="hidden">
    <button id="import" class="text-sm px-3 py-1.5 rounded-md border border-zinc-200 hover:bg-zinc-50">불러오기</button>
    <button id="export" class="text-sm px-3 py-1.5 rounded-md bg-violet-600 text-white hover:bg-violet-700">내보내기</button>
  </div>
</header>

<main class="grid grid-cols-[300px_360px_1fr] h-[calc(100vh-3.5rem)]">
  <!-- col 1: requirements -->
  <section class="border-r border-zinc-200 bg-white flex flex-col">
    <div class="flex items-center justify-between px-4 h-12 border-b border-zinc-100">
      <h2 class="text-sm font-medium">요구사항</h2>
      <button id="addReq" class="text-zinc-400 hover:text-zinc-900 text-lg leading-none">+</button>
    </div>
    <ul id="reqList" class="flex-1 overflow-auto py-1"></ul>
  </section>

  <!-- col 2: features / specs -->
  <section class="border-r border-zinc-200 bg-white flex flex-col">
    <div class="flex items-center justify-between px-4 h-12 border-b border-zinc-100">
      <h2 class="text-sm font-medium">기능 / 상세 기능</h2>
      <button id="addFeat" class="text-zinc-400 hover:text-zinc-900 text-lg leading-none">+</button>
    </div>
    <ul id="featList" class="flex-1 overflow-auto py-1"></ul>
  </section>

  <!-- col 3: detail -->
  <section class="overflow-auto">
    <div id="detail" class="max-w-2xl mx-auto p-8 text-zinc-500">왼쪽에서 기능을 선택하세요.</div>
  </section>
</main>

<script>
const PROJECT = __TIMPLAY_DATA__;
const $ = (s,r=document)=>r.querySelector(s);
const data = PROJECT.features;
const roles = (PROJECT.prd && PROJECT.prd.attributes && PROJECT.prd.attributes.roles) || [];
const roleName = id => (roles.find(r=>r.id===id)||{}).name || "—";
$("#pname").textContent = (PROJECT.meta && PROJECT.meta.productName) || "기능명세서";

let selReq = data.requirements[0] ? data.requirements[0].id : null;
let selFeat = null;
const openFeat = new Set();
const byOrder = a => [...a].sort((x,y)=>(x.order??0)-(y.order??0));
const reqById = id => data.requirements.find(r=>r.id===id);

function renderReqs(){
  const ul = $("#reqList"); ul.innerHTML="";
  byOrder(data.requirements).forEach((r,i)=>{
    const li=document.createElement("li");
    li.dataset.id=r.id;
    li.className="row "+(r.id===selReq?"sel":"")+" mx-2 px-2 py-2 rounded-md flex items-center gap-2 hover:bg-zinc-50";
    li.innerHTML=`<span class="grab text-zinc-300">⠿</span>
      <span class="text-violet-600 text-sm w-4">${i+1}</span>
      <span class="flex-1 text-sm truncate">${esc(r.title)}</span>
      <span class="badge">${r.features.length}</span>`;
    li.querySelector(".flex-1").onclick=()=>{selReq=r.id;selFeat=null;renderAll();};
    li.querySelector(".flex-1").ondblclick=()=>renameInline(li.querySelector(".flex-1"),v=>{r.title=v;persist();});
    ul.appendChild(li);
  });
  makeSortable(ul, data.requirements);
}

function renderFeats(){
  const ul=$("#featList"); ul.innerHTML="";
  const req=reqById(selReq);
  if(!req){ul.innerHTML='<li class="px-4 py-3 text-sm text-zinc-400">요구사항을 선택하세요.</li>';return;}
  byOrder(req.features).forEach((f,i)=>{
    const li=document.createElement("li"); li.dataset.id=f.id; li.className="mb-0.5";
    const open=openFeat.has(f.id);
    li.innerHTML=`
      <div class="row ${f.id===selFeat?'sel':''} mx-2 px-2 py-2 rounded-md flex items-center gap-2 hover:bg-zinc-50">
        <span class="grab text-zinc-300">⠿</span>
        <span class="chev ${open?'open':''} text-zinc-400 text-xs">▶</span>
        <span class="text-violet-600 text-sm w-4">${i+1}</span>
        <span class="flex-1 text-sm truncate">${esc(f.title)}</span>
        <span class="badge">${f.specs.length}</span>
      </div>
      <ul class="specs ${open?'':'hidden'} pl-10 pr-2"></ul>`;
    const head=li.querySelector(".row");
    head.querySelector(".chev").onclick=e=>{e.stopPropagation();open?openFeat.delete(f.id):openFeat.add(f.id);renderFeats();};
    head.querySelector(".flex-1").onclick=()=>{selFeat=f.id;openFeat.add(f.id);renderAll();};
    head.querySelector(".flex-1").ondblclick=()=>renameInline(head.querySelector(".flex-1"),v=>{f.title=v;persist();});
    const sul=li.querySelector(".specs");
    byOrder(f.specs).forEach((s,j)=>{
      const sli=document.createElement("li");
      sli.dataset.id=s.id;
      sli.className="row flex items-center gap-2 py-1.5 px-2 rounded hover:bg-zinc-50";
      sli.innerHTML=`<span class="grab text-zinc-300 text-xs">⠿</span>
        <span class="text-zinc-400 text-xs w-3">${j+1}</span>
        <span class="flex-1 text-sm text-zinc-700 truncate">${esc(s.title)}</span>`;
      sli.querySelector(".flex-1").ondblclick=()=>renameInline(sli.querySelector(".flex-1"),v=>{s.title=v;persist();});
      sul.appendChild(sli);
    });
    const addSpec=document.createElement("li");
    addSpec.className="text-xs text-zinc-400 hover:text-violet-600 cursor-pointer py-1.5 px-2";
    addSpec.textContent="+ 상세 기능 추가";
    addSpec.onclick=()=>{const n=nextId("S");f.specs.push({id:n,title:"새 상세 기능",order:f.specs.length,description:""});persist();renderFeats();};
    sul.appendChild(addSpec);
    makeSortable(sul,f.specs);
    ul.appendChild(li);
  });
  makeSortable(ul, req.features);
}

function renderDetail(){
  const box=$("#detail");
  const req=reqById(selReq);
  const f=req && req.features.find(x=>x.id===selFeat);
  if(!f){box.className="max-w-2xl mx-auto p-8 text-zinc-500";box.textContent="왼쪽에서 기능을 선택하세요.";return;}
  box.className="max-w-2xl mx-auto p-8";
  box.innerHTML=`
    <h1 class="text-2xl font-semibold mb-4">${esc(f.title)}</h1>
    <dl class="grid grid-cols-[80px_1fr] gap-y-3 text-sm mb-6">
      <dt class="text-zinc-400">ID</dt><dd>${f.id}</dd>
      <dt class="text-zinc-400">담당 역할</dt><dd>${esc(roleName(f.roleId))}</dd>
      <dt class="text-zinc-400">상태</dt><dd>${({todo:'시작전',doing:'진행중',done:'완료'})[f.status]||'시작전'}</dd>
      <dt class="text-zinc-400">중요도</dt><dd>${({low:'낮음',medium:'보통',high:'높음'})[f.importance]||'보통'}</dd>
    </dl>
    <h3 class="text-sm text-zinc-400 mb-1">설명</h3>
    <p class="text-sm leading-relaxed mb-6 whitespace-pre-wrap">${esc(f.description||"")}</p>
    <h3 class="text-sm text-zinc-400 mb-2">수용 기준</h3>
    <ul class="space-y-2">
      ${(f.acceptanceCriteria||[]).map((c,i)=>`
        <li class="flex items-start gap-2 text-sm border border-zinc-100 rounded-md px-3 py-2">
          <input type="checkbox" data-i="${i}" ${c.done?'checked':''} class="mt-0.5 ac-check">
          <span class="flex-1">${esc(c.text)}</span>
        </li>`).join("")}
    </ul>`;
  box.querySelectorAll(".ac-check").forEach(cb=>cb.onchange=()=>{f.acceptanceCriteria[cb.dataset.i].done=cb.checked;persist();});
}

function renderAll(){renderReqs();renderFeats();renderDetail();}

function makeSortable(ul, model){
  new Sortable(ul,{handle:".grab",animation:120,onEnd:()=>{
    [...ul.children].forEach((li,idx)=>{
      const item=model.find(m=>m.id===li.dataset.id);
      if(item) item.order=idx;
    });
    persist();renderAll();
  }});
}

function renameInline(span,save){
  const cur=span.textContent;
  const inp=document.createElement("input");
  inp.value=cur; inp.className="w-full text-sm border border-violet-300 rounded px-1";
  span.replaceWith(inp); inp.focus(); inp.select();
  const done=()=>{const v=inp.value.trim()||cur;save(v);renderAll();};
  inp.onblur=done; inp.onkeydown=e=>{if(e.key==="Enter")inp.blur();if(e.key==="Escape"){inp.value=cur;inp.blur();}};
}

let idc=Date.now();
function nextId(p){return `${p}-${(++idc).toString(36)}`;}
function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

$("#addReq").onclick=()=>{const id=nextId("R");data.requirements.push({id,title:"새 요구사항",order:data.requirements.length,features:[]});selReq=id;persist();renderAll();};
$("#addFeat").onclick=()=>{const req=reqById(selReq);if(!req)return;const id=nextId("F");req.features.push({id,title:"새 기능",order:req.features.length,roleId:roles[0]?.id||null,status:"todo",importance:"medium",description:"",acceptanceCriteria:[],specs:[]});selFeat=id;persist();renderAll();};

// persistence + import/export
const LS="timplay:"+((PROJECT.meta&&PROJECT.meta.slug)||"features");
function persist(){try{localStorage.setItem(LS,JSON.stringify(PROJECT));}catch(e){}}
(function restore(){try{const s=localStorage.getItem(LS);if(s){const o=JSON.parse(s);if(o.features){data.requirements=o.features.requirements;}}}catch(e){}})();
$("#export").onclick=()=>{
  const blob=new Blob([JSON.stringify(PROJECT,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=((PROJECT.meta&&PROJECT.meta.slug)||"project")+".json";a.click();
};
$("#import").onclick=()=>$("#file").click();
$("#file").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const o=JSON.parse(r.result);Object.assign(PROJECT,o);data.requirements=(o.features||data).requirements;selReq=data.requirements[0]?.id||null;selFeat=null;persist();renderAll();}catch(err){alert("JSON 파싱 실패: "+err.message);}};
  r.readAsText(f);};

renderAll();
</script>
</body>
</html>
