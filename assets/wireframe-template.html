<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>와이어프레임</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{font-family:Inter,system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif}
  /* shadcn-ish tokens */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;height:2.25rem;padding:0 .9rem;
    border-radius:.5rem;font-size:.875rem;font-weight:500;cursor:pointer;transition:.12s}
  .btn-primary{background:#18181b;color:#fff}.btn-primary:hover{background:#27272a}
  .btn-secondary{background:#f4f4f5;color:#18181b}.btn-secondary:hover{background:#e4e4e7}
  .btn-ghost{background:transparent;color:#18181b}.btn-ghost:hover{background:#f4f4f5}
  .btn-destructive{background:#dc2626;color:#fff}.btn-destructive:hover{background:#b91c1c}
  .inp{width:100%;height:2.25rem;border:1px solid #e4e4e7;border-radius:.5rem;padding:0 .75rem;font-size:.875rem}
  .card{border:1px solid #e4e4e7;border-radius:.75rem;padding:1rem;background:#fff}
</style>
</head>
<body class="bg-zinc-50 text-zinc-900">
<header class="h-14 border-b border-zinc-200 bg-white flex items-center px-4 gap-3 sticky top-0 z-20">
  <span class="w-6 h-6 rounded bg-violet-600"></span>
  <span id="pname" class="font-medium truncate"></span>
  <nav class="ml-3 flex items-center gap-1 text-sm text-zinc-400">
    <a href="prd.md" class="px-2 py-1 rounded hover:bg-zinc-100">PRD</a><span>·</span>
    <a href="features.html" class="px-2 py-1 rounded hover:bg-zinc-100">기능명세서</a><span>·</span>
    <a href="userflow.html" class="px-2 py-1 rounded hover:bg-zinc-100">유저플로우</a><span>·</span>
    <a href="wireframe.html" class="px-2 py-1 rounded bg-zinc-100 text-zinc-900 font-medium">와이어프레임</a>
  </nav>
  <div class="ml-auto flex items-center gap-2">
    <div class="flex rounded-md border border-zinc-200 overflow-hidden text-sm">
      <button id="dtDesktop" class="px-3 py-1.5">데스크탑</button>
      <button id="dtMobile" class="px-3 py-1.5 border-l border-zinc-200">모바일</button>
    </div>
    <input id="file" type="file" accept="application/json" class="hidden">
    <button id="import" class="text-sm px-3 py-1.5 rounded-md border border-zinc-200 hover:bg-zinc-50">불러오기</button>
    <button id="export" class="text-sm px-3 py-1.5 rounded-md bg-violet-600 text-white hover:bg-violet-700">내보내기</button>
  </div>
</header>

<div class="flex h-[calc(100vh-3.5rem)]">
  <aside class="w-56 border-r border-zinc-200 bg-white p-3 overflow-auto">
    <h2 class="text-xs font-medium text-zinc-400 px-2 mb-2">화면 목록</h2>
    <ul id="screenList" class="space-y-0.5"></ul>
  </aside>
  <div class="flex-1 overflow-auto grid place-items-center p-8 bg-zinc-100">
    <div id="frame"></div>
  </div>
</div>

<script>
const PROJECT=__TIMPLAY_DATA__;
const $=(s,r=document)=>r.querySelector(s);
if(!PROJECT.wireframe||typeof PROJECT.wireframe!=='object')PROJECT.wireframe={device:"desktop",nav:[],screens:[]};
if(!Array.isArray(PROJECT.wireframe.screens))PROJECT.wireframe.screens=[];
if(!Array.isArray(PROJECT.wireframe.nav))PROJECT.wireframe.nav=[];
const wf=PROJECT.wireframe;
$("#pname").textContent=(PROJECT.meta&&PROJECT.meta.productName)||"와이어프레임";
let device=wf.device||"desktop";
let current=wf.screens[0]?.id;
const screenById=id=>wf.screens.find(s=>s.id===id);

const badgeColor=v=>({success:"bg-emerald-100 text-emerald-700",warning:"bg-amber-100 text-amber-700",danger:"bg-red-100 text-red-700",info:"bg-violet-100 text-violet-700"})[v]||"bg-zinc-100 text-zinc-600";
const alertCls=v=>({success:"border-emerald-200 bg-emerald-50 text-emerald-700",warning:"border-amber-200 bg-amber-50 text-amber-700",danger:"border-red-200 bg-red-50 text-red-700"})[v]||"border-violet-200 bg-violet-50 text-violet-700";

// Render one element. shadcn-style vocabulary; row/grid/card recurse into children.
function el(node){
  if(!node||typeof node!=="object")return "";
  const link=node.linkTo?` data-link="${esc(node.linkTo)}"`:"";
  switch(node.type){
    case "heading":    return `<h2 class="text-xl font-semibold mb-2">${esc(node.text)}</h2>`;
    case "subheading": return `<h3 class="text-sm font-semibold text-zinc-700 mt-2 mb-1">${esc(node.text)}</h3>`;
    case "text":       return `<p class="text-sm text-zinc-500 mb-2">${esc(node.text)}</p>`;
    case "divider":    return `<hr class="my-3 border-zinc-200">`;
    case "spacer":     return `<div style="height:${parseInt(node.height,10)||16}px"></div>`;
    case "breadcrumb": return `<div class="text-xs text-zinc-400 mb-3">${(node.items||[]).map(esc).join(' <span class="text-zinc-300">/</span> ')}</div>`;
    case "searchbar":  return `<div class="relative mb-3"><input class="inp" style="padding-left:1.9rem" placeholder="${esc(node.placeholder||'검색')}"><span class="absolute left-2.5 top-1.5 text-zinc-400">⌕</span></div>`;
    case "input":      return `<label class="block text-sm mb-3"><span class="text-zinc-600 mb-1 block">${esc(node.label||"")}</span><input class="inp" type="${esc(node.inputType||'text')}" placeholder="${esc(node.placeholder||'')}"></label>`;
    case "textarea":   return `<label class="block text-sm mb-3"><span class="text-zinc-600 mb-1 block">${esc(node.label||"")}</span><textarea class="inp" style="height:auto;padding:.5rem .75rem" rows="${parseInt(node.rows,10)||3}" placeholder="${esc(node.placeholder||'')}"></textarea></label>`;
    case "select":     return `<label class="block text-sm mb-3"><span class="text-zinc-600 mb-1 block">${esc(node.label||"")}</span><select class="inp">${(node.options||[]).map(o=>`<option>${esc(o)}</option>`).join("")}</select></label>`;
    case "checkbox":   return `<label class="flex items-center gap-2 text-sm mb-2"><input type="checkbox" ${node.checked?"checked":""}><span>${esc(node.label||"")}</span></label>`;
    case "radio":      return `<div class="mb-3 text-sm">${node.label?`<div class="text-zinc-600 mb-1">${esc(node.label)}</div>`:""}${(node.options||[]).map((o,i)=>`<label class="flex items-center gap-2 mb-1"><input type="radio" name="${esc(node.name||'r')}" ${i===0?"checked":""}><span>${esc(o)}</span></label>`).join("")}</div>`;
    case "image":      return `<div class="rounded-lg bg-zinc-100 border border-dashed border-zinc-300 grid place-items-center text-zinc-400 text-xs mb-3" style="height:${parseInt(node.height,10)||120}px">${esc(node.text||'이미지')}</div>`;
    case "avatar":     return `<div class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-violet-100 text-violet-700 text-sm font-medium mb-2">${esc((node.text||'U').slice(0,2))}</div>`;
    case "badge":      return `<span class="inline-block text-xs px-2 py-0.5 rounded-full ${badgeColor(node.variant)} mr-1 mb-1">${esc(node.text)}</span>`;
    case "tag":        return `<span class="inline-block text-xs px-2 py-0.5 rounded border border-zinc-200 text-zinc-600 mr-1 mb-1">${esc(node.text)}</span>`;
    case "button":     return `<button class="btn btn-${esc(node.variant||'secondary')} mb-2 mr-2"${link}>${esc(node.text)}</button>`;
    case "alert":      return `<div class="text-sm rounded-lg border px-3 py-2 mb-3 ${alertCls(node.variant)}">${esc(node.text)}</div>`;
    case "stat":       return `<div class="card mb-3${node.linkTo?' cursor-pointer hover:border-zinc-300':''}"${link}><div class="text-xs text-zinc-400">${esc(node.label||"")}</div><div class="text-2xl font-semibold mt-1">${esc(node.value??"")}</div>${node.delta?`<div class="text-xs mt-1 ${String(node.delta).trim().startsWith('-')?'text-red-600':'text-emerald-600'}">${esc(node.delta)}</div>`:""}</div>`;
    case "tabs":       return `<div class="border-b border-zinc-200 mb-3 flex gap-4 text-sm">${(node.items||[]).map((t,i)=>{const o=(typeof t==="object")?t:{label:t};return `<span class="pb-2 -mb-px ${i===(node.active||0)?'border-b-2 border-zinc-900 font-medium':'text-zinc-400 cursor-pointer'}"${o.linkTo?` data-link="${esc(o.linkTo)}"`:""}>${esc(o.label)}</span>`;}).join("")}</div>`;
    case "table":      return `<div class="border border-zinc-200 rounded-lg overflow-hidden mb-3"><table class="w-full text-sm"><thead class="bg-zinc-50 text-zinc-500"><tr>${(node.columns||[]).map(c=>`<th class="text-left font-medium px-3 py-2">${esc(c)}</th>`).join("")}</tr></thead><tbody>${(node.rows||[]).map(r=>`<tr class="border-t border-zinc-100">${(r||[]).map(c=>`<td class="px-3 py-2">${esc(c)}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
    case "list":       return `<ul class="divide-y divide-zinc-100 border border-zinc-200 rounded-lg mb-3">${(node.items||[]).map(it=>`<li class="px-3 py-2.5 text-sm flex justify-between items-center ${it.linkTo?'cursor-pointer hover:bg-zinc-50':''}"${it.linkTo?` data-link="${esc(it.linkTo)}"`:""}><span>${esc(it.text)}</span>${it.linkTo?'<span class="text-zinc-300">›</span>':''}</li>`).join("")}</ul>`;
    case "card":       return `<div class="card mb-3${node.linkTo?' cursor-pointer hover:border-zinc-300':''}"${link}>${node.title?`<div class="font-medium mb-1">${esc(node.title)}</div>`:""}${node.text?`<div class="text-sm text-zinc-500">${esc(node.text)}</div>`:""}${Array.isArray(node.children)?`<div class="mt-2">${node.children.map(el).join("")}</div>`:""}</div>`;
    case "row":        return `<div class="flex gap-3 mb-3 items-start flex-wrap">${(node.children||[]).map(c=>`<div class="flex-1" style="min-width:0">${el(c)}</div>`).join("")}</div>`;
    case "grid":       return `<div class="grid gap-3 mb-3" style="grid-template-columns:repeat(${parseInt(node.cols,10)||2},minmax(0,1fr))">${(node.children||[]).map(el).join("")}</div>`;
    default:           return "";
  }
}

function screenBody(s){ return (s.elements||[]).map(el).join(""); }

// Per-screen chrome. layout ∈ app | centered | landing | blank (default app).
function frame(s){
  const layout=s.layout||"app", title=esc(s.title), body=screenBody(s);
  const product=esc((PROJECT.meta&&PROJECT.meta.productName)||"");
  const nav=wf.nav||[];
  const topnav=`<div class="h-12 border-b border-zinc-200 flex items-center px-4 gap-4 shrink-0"><span class="w-5 h-5 rounded bg-violet-600"></span><span class="font-medium text-sm">${product}</span><div class="ml-auto flex gap-3 text-sm text-zinc-500">${nav.map(n=>`<span class="cursor-pointer hover:text-zinc-900" data-link="${esc(n.screenId)}">${esc(n.label)}</span>`).join("")}</div></div>`;
  if(device==="mobile"){
    const tab=layout==="app"?`<div class="h-14 border-t border-zinc-200 flex items-center justify-around shrink-0">${(nav.length?nav:wf.screens.slice(0,4).map(x=>({screenId:x.id,label:x.title}))).slice(0,5).map(n=>`<div class="flex flex-col items-center text-[10px] cursor-pointer ${n.screenId===current?'text-violet-600':'text-zinc-400'}" data-link="${esc(n.screenId)}"><span class="w-5 h-5 rounded ${n.screenId===current?'bg-violet-600':'bg-zinc-300'} mb-0.5"></span>${esc(n.label)}</div>`).join("")}</div>`:"";
    const inner=layout==="centered"?`<div class="flex-1 overflow-auto px-4 grid place-items-center"><div class="w-full">${body}</div></div>`:`<div class="flex-1 overflow-auto px-4 pb-4">${body}</div>`;
    return `<div class="bg-white rounded-[2rem] shadow-lg border-[6px] border-zinc-900 overflow-hidden" style="width:340px;height:680px;display:flex;flex-direction:column"><div class="h-10 flex items-center justify-center text-xs text-zinc-400 shrink-0">${title}</div>${inner}${tab}</div>`;
  }
  const W='style="width:960px;height:620px;display:flex;flex-direction:column"';
  if(layout==="centered")
    return `<div class="bg-zinc-50 rounded-xl shadow-lg overflow-hidden border border-zinc-200 grid place-items-center" ${W}><div class="card" style="width:100%;max-width:380px"><h1 class="text-lg font-semibold mb-4 text-center">${title}</h1>${body}</div></div>`;
  if(layout==="landing")
    return `<div class="bg-white rounded-xl shadow-lg overflow-hidden border border-zinc-200" ${W}>${topnav}<div class="flex-1 overflow-auto p-10">${body}</div></div>`;
  if(layout==="blank")
    return `<div class="bg-white rounded-xl shadow-lg overflow-auto border border-zinc-200 p-8" ${W}><h1 class="text-lg font-semibold mb-4">${title}</h1>${body}</div>`;
  // app (default): top nav + sidebar + content
  const side=`<div class="w-48 border-r border-zinc-200 p-3 space-y-1 shrink-0">${nav.map(n=>`<div class="px-2 py-1.5 rounded text-sm cursor-pointer ${n.screenId===current?'bg-zinc-100 font-medium':'text-zinc-500 hover:bg-zinc-50'}" data-link="${esc(n.screenId)}">${esc(n.label)}</div>`).join("")}</div>`;
  return `<div class="bg-white rounded-xl shadow-lg overflow-hidden border border-zinc-200" ${W}>${topnav}<div class="flex flex-1 min-h-0">${side}<div class="flex-1 overflow-auto p-6"><h1 class="text-lg font-semibold mb-4">${title}</h1>${body}</div></div></div>`;
}

function render(){
  $("#dtDesktop").className="px-3 py-1.5"+(device==="desktop"?" bg-zinc-900 text-white":"");
  $("#dtMobile").className="px-3 py-1.5 border-l border-zinc-200"+(device==="mobile"?" bg-zinc-900 text-white":"");
  // screen list
  const sl=$("#screenList"); sl.innerHTML="";
  wf.screens.forEach(s=>{
    const li=document.createElement("li");
    li.className="px-2 py-1.5 rounded text-sm cursor-pointer truncate "+(s.id===current?"bg-violet-50 text-violet-700":"hover:bg-zinc-50");
    li.textContent=s.title; li.onclick=()=>{current=s.id;render();};
    sl.appendChild(li);
  });
  const s=screenById(current)||wf.screens[0]; if(!s){$("#frame").innerHTML='<div class="text-sm text-zinc-400 p-8">화면이 없습니다. 유저플로우의 페이지 노드에서 와이어프레임을 생성하세요.</div>';return;}
  $("#frame").innerHTML=frame(s);
  // wire up navigation
  $("#frame").querySelectorAll("[data-link]").forEach(b=>b.onclick=e=>{
    e.stopPropagation();const t=b.getAttribute("data-link");
    if(screenById(t)){current=t;render();}
  });
}

function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
$("#dtDesktop").onclick=()=>{device="desktop";wf.device=device;persist();render();};
$("#dtMobile").onclick=()=>{device="mobile";wf.device=device;persist();render();};

const LS="timplay:project:"+((PROJECT.meta&&PROJECT.meta.slug)||"default");
function stamp(){(PROJECT.meta=PROJECT.meta||{}).updatedAt=Date.now();}
function rev(o){return (o&&o.meta&&o.meta.updatedAt)||0;}
function persist(){try{stamp();localStorage.setItem(LS,JSON.stringify(PROJECT));}catch(e){}}
function syncFromShared(o){ // replace each stage's contents in place (keeps `wf` alias valid)
  if(!o)return false;
  for(const k of ['meta','prd','features','userflow','wireframe']){
    if(o[k]==null)continue;
    const cur=PROJECT[k], val=o[k];
    if(cur&&typeof cur==='object'&&!Array.isArray(cur)&&typeof val==='object'&&!Array.isArray(val)){for(const kk of Object.keys(cur))delete cur[kk];Object.assign(cur,val);}
    else PROJECT[k]=val;
  }
  if(!Array.isArray(wf.screens))wf.screens=[]; if(!Array.isArray(wf.nav))wf.nav=[];  // mutate in place — keeps `wf` alias valid
  device=wf.device||device; if(!screenById(current))current=wf.screens[0]?.id;
  return true;
}
(function restore(){try{const s=localStorage.getItem(LS);if(s){const o=JSON.parse(s);if(rev(o)>=rev(PROJECT))syncFromShared(o);}}catch(e){}})();
window.addEventListener("storage",e=>{if(e.key!==LS||!e.newValue)return;try{const o=JSON.parse(e.newValue);if(rev(o)>=rev(PROJECT)){syncFromShared(o);render();}}catch(err){}});
// save/load: overwrite the SAME project.json in place when supported, else download.
const SLUG=(PROJECT.meta&&PROJECT.meta.slug)||"project";
const FSA="showSaveFilePicker" in window;
let fileHandle=null;
const idb={open(){return new Promise(res=>{let r;try{r=indexedDB.open("timplay",1);}catch(e){return res(null);}r.onupgradeneeded=()=>r.result.createObjectStore("handles");r.onsuccess=()=>res(r.result);r.onerror=()=>res(null);});},
  async get(k){const db=await this.open();if(!db)return null;return new Promise(res=>{try{const t=db.transaction("handles").objectStore("handles").get(k);t.onsuccess=()=>res(t.result||null);t.onerror=()=>res(null);}catch(e){res(null);}});},
  async set(k,v){const db=await this.open();if(!db)return;try{db.transaction("handles","readwrite").objectStore("handles").put(v,k);}catch(e){}}};
async function perm(h){if(!h.queryPermission)return true;if(await h.queryPermission({mode:"readwrite"})==="granted")return true;return (await h.requestPermission({mode:"readwrite"}))==="granted";}
function flashSaved(msg){const b=$("#export");if(!b.dataset.t)b.dataset.t=b.textContent;b.textContent="✓ "+msg;setTimeout(()=>{b.textContent=b.dataset.t;},1200);}
function applyImport(text){try{const o=JSON.parse(text);if(typeof o!=="object"||o===null||Array.isArray(o))throw new Error("최상위가 JSON 객체가 아닙니다");if("wireframe"in o&&o.wireframe&&!Array.isArray(o.wireframe.screens))throw new Error("wireframe.screens가 배열이 아닙니다");syncFromShared(o);persist();render();}catch(err){alert("불러오기 실패: "+err.message);}}
async function doExport(){
  const text=JSON.stringify(PROJECT,null,2);
  if(FSA){try{
    if(!fileHandle)fileHandle=await idb.get("file:"+SLUG);
    if(fileHandle&&!(await perm(fileHandle)))fileHandle=null;
    if(!fileHandle){fileHandle=await window.showSaveFilePicker({suggestedName:SLUG+".json",types:[{description:"JSON",accept:{"application/json":[".json"]}}]});await idb.set("file:"+SLUG,fileHandle);}
    const w=await fileHandle.createWritable();await w.write(text);await w.close();flashSaved("저장됨");return;
  }catch(err){if(err&&err.name==="AbortError")return;}}
  const blob=new Blob([text],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=SLUG+".json";a.click();
}
async function doImport(){
  if(FSA){try{const [h]=await window.showOpenFilePicker({types:[{description:"JSON",accept:{"application/json":[".json"]}}]});fileHandle=h;await idb.set("file:"+SLUG,h);applyImport(await (await h.getFile()).text());return;}catch(err){if(err&&err.name==="AbortError")return;}}
  $("#file").click();
}
$("#export").onclick=doExport;
$("#import").onclick=doImport;
$("#file").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>applyImport(r.result);r.readAsText(f);};

render();
</script>
</body>
</html>
