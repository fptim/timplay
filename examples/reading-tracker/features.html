<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>기능명세서</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
  body{font-family:Inter,system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif}
  .badge{display:inline-flex;align-items:center;justify-content:center;min-width:1.25rem;height:1.25rem;
    font-size:.7rem;border-radius:9999px;background:#f4f4f5;color:#71717a;padding:0 .35rem}
  .row{cursor:pointer}
  .row.sel{background:#f5f3ff}
  .grab{cursor:grab}
  .chev{transition:transform .15s}
  .chev.open{transform:rotate(90deg)}
  .del-x{opacity:0;transition:.1s;color:#a1a1aa;cursor:pointer;font-size:.9rem;line-height:1}
  .row:hover .del-x{opacity:1}
  .del-x:hover{color:#dc2626}
  .fld{width:100%;border:1px solid #e4e4e7;border-radius:.5rem;padding:.4rem .6rem;font-size:.875rem;background:#fff;color:#18181b}
  .fld:focus{outline:none;border-color:#a78bfa;box-shadow:0 0 0 3px #ede9fe}
</style>
</head>
<body class="bg-zinc-50 text-zinc-900">
<!-- top bar -->
<header class="h-14 border-b border-zinc-200 bg-white flex items-center px-4 gap-3 sticky top-0 z-10">
  <span class="w-6 h-6 rounded bg-violet-600"></span>
  <span id="pname" class="font-medium truncate"></span>
  <nav class="ml-3 flex items-center gap-1 text-sm text-zinc-400">
    <a href="prd.md" class="px-2 py-1 rounded hover:bg-zinc-100">PRD</a><span>·</span>
    <a href="features.html" class="px-2 py-1 rounded bg-zinc-100 text-zinc-900 font-medium">기능명세서</a><span>·</span>
    <a href="userflow.html" class="px-2 py-1 rounded hover:bg-zinc-100">유저플로우</a><span>·</span>
    <a href="wireframe.html" class="px-2 py-1 rounded hover:bg-zinc-100">와이어프레임</a>
  </nav>
  <div class="ml-auto flex items-center gap-2">
    <input id="file" type="file" accept="application/json" class="hidden">
    <button id="import" class="text-sm px-3 py-1.5 rounded-md border border-zinc-200 hover:bg-zinc-50">불러오기</button>
    <button id="export" class="text-sm px-3 py-1.5 rounded-md bg-violet-600 text-white hover:bg-violet-700">내보내기</button>
  </div>
</header>

<main class="grid grid-cols-[300px_360px_1fr] h-[calc(100vh-3.5rem)]">
  <!-- col 1: requirements -->
  <section class="border-r border-zinc-200 bg-white flex flex-col">
    <div class="flex items-center justify-between px-4 h-12 border-b border-zinc-100">
      <h2 class="text-sm font-medium">요구사항</h2>
      <button id="addReq" class="text-zinc-400 hover:text-zinc-900 text-lg leading-none" title="요구사항 추가">+</button>
    </div>
    <ul id="reqList" class="flex-1 overflow-auto py-1"></ul>
  </section>

  <!-- col 2: features / specs -->
  <section class="border-r border-zinc-200 bg-white flex flex-col">
    <div class="flex items-center justify-between px-4 h-12 border-b border-zinc-100">
      <h2 class="text-sm font-medium">기능 / 상세 기능</h2>
      <button id="addFeat" class="text-zinc-400 hover:text-zinc-900 text-lg leading-none" title="기능 추가">+</button>
    </div>
    <ul id="featList" class="flex-1 overflow-auto py-1"></ul>
  </section>

  <!-- col 3: detail -->
  <section class="overflow-auto">
    <div id="detail" class="max-w-2xl mx-auto p-8 text-zinc-500"></div>
  </section>
</main>

<script>
const PROJECT = {"meta": {"productName": "초보 독자를 위한 독서 기록 앱", "slug": "reading-tracker", "language": "ko", "createdAt": "2026-06-24", "updatedAt": 1782302500595}, "prd": {"overview": {"oneLiner": "읽은 책을 쉽게 기록하고 독서 습관을 이어가도록 돕는 초보 독자용 앱", "goals": ["검색 한 번으로 책 정보를 자동 입력해 기록 마찰을 없앤다", "진척도와 통계로 독서 동기를 유지한다", "첫 4주 재방문율을 끌어올린다"], "background": "초보 독자는 기록을 시작해도 입력이 번거로워 금방 그만둔다. 가벼운 자동화로 습관 형성을 돕는다."}, "coreValue": {"problem": "책을 읽어도 기록이 귀찮아 흐지부지되고, 무엇을 얼마나 읽었는지 남지 않는다.", "solution": "ISBN·제목 검색으로 표지·저자를 자동 채우고, 별점·짧은 감상만으로 1분 안에 기록을 마친다.", "differentiation": "범용 메모앱과 달리 독서에 특화된 자동 입력과 진척도 통계를 기본 제공한다."}, "targetScenario": {"userGroups": [{"name": "초보 독자", "description": "한 달 1~2권, 기록 습관이 없고 입력 마찰에 민감"}, {"name": "기록 애호가", "description": "통계·회고를 즐기며 데이터를 꾸준히 남김"}], "scenarios": [{"title": "첫 기록", "story": "앱을 켜고 방금 다 읽은 책을 제목으로 검색해 선택하면 정보가 자동 입력된다. 별점과 한 줄 감상을 남기고 저장하면 서재에 첫 책이 꽂힌다."}]}, "metrics": {"kpis": [{"name": "4주 재방문율", "target": "35% 이상"}, {"name": "첫 기록까지 시간", "target": "설치 후 3분 이내"}], "risks": ["책 메타데이터 검색 정확도", "초기 빈 화면의 동기 부여 부족"], "openIssues": ["전자책 연동 범위", "소셜 공유 우선순위"]}, "attributes": {"category": "라이프스타일 / 생산성", "roles": [{"id": "reader", "name": "독자"}, {"id": "admin", "name": "관리자"}], "environments": ["web", "ios"]}}, "features": {"requirements": [{"id": "R-1", "title": "책 검색 및 기록", "order": 0, "features": [{"id": "F-1", "title": "책 검색 기능", "order": 0, "roleId": "reader", "status": "todo", "importance": "high", "description": "제목·저자·ISBN으로 책을 검색하고 선택하면 표지·저자 등 기본 정보가 자동 입력된다.", "acceptanceCriteria": [{"text": "제목·저자·ISBN으로 검색할 수 있다", "done": false}, {"text": "검색 결과 선택 시 기본 정보가 자동 입력된다", "done": false}], "specs": [{"id": "S-1", "title": "책 상세 정보 조회", "order": 0, "description": "선택한 책의 표지·저자·출간일·소개를 상세 화면에 보여준다."}, {"id": "S-2", "title": "검색 자동완성", "order": 1, "description": "두 글자 이상 입력 시 후보를 자동완성으로 제안한다."}]}, {"id": "F-2", "title": "감상 및 별점 기록", "order": 1, "roleId": "reader", "status": "todo", "importance": "medium", "description": "책마다 별점과 짧은 감상을 남기고 언제든 편집한다.", "acceptanceCriteria": [{"text": "0.5 단위 별점을 줄 수 있다", "done": false}], "specs": [{"id": "S-3", "title": "감상 자동 저장", "order": 0, "description": "입력 중 자동 저장되어 이탈해도 유실되지 않는다."}]}]}, {"id": "R-2", "title": "독서 진척도 및 통계", "order": 1, "features": [{"id": "F-3", "title": "진척도 기록", "order": 0, "roleId": "reader", "status": "todo", "importance": "high", "description": "읽기 시작일·완료일과 현재 페이지를 기록해 진행률을 보여준다.", "acceptanceCriteria": [{"text": "현재 페이지로 진행률(%)이 계산된다", "done": false}], "specs": []}]}]}, "userflow": {"activeVersionId": "uf-1", "versions": [{"id": "uf-1", "name": "기본 플로우", "createdAt": "2026-06-24", "parentId": null, "sections": [{"id": "sec-1", "title": "온보딩", "order": 0}, {"id": "sec-2", "title": "서재", "order": 1}], "nodes": [{"id": "n-1", "type": "start", "label": "시작", "sectionId": "sec-1", "x": 40, "y": 70}, {"id": "n-2", "type": "sectionTop", "label": "홈 / 서재", "sectionId": "sec-2", "x": 260, "y": 70, "ref": {"type": "feature", "id": "F-3"}}, {"id": "n-3", "type": "page", "label": "책 검색", "sectionId": "sec-2", "x": 500, "y": 30, "ref": {"type": "feature", "id": "F-1"}}, {"id": "n-4", "type": "page", "label": "책 상세 / 기록", "sectionId": "sec-2", "x": 500, "y": 150, "ref": {"type": "spec", "id": "S-1"}}, {"id": "n-5", "type": "action", "label": "기록 저장", "sectionId": "sec-2", "x": 740, "y": 150}], "edges": [{"id": "e-1", "from": "n-1", "to": "n-2"}, {"id": "e-2", "from": "n-2", "to": "n-3"}, {"id": "e-3", "from": "n-3", "to": "n-4"}, {"id": "e-4", "from": "n-4", "to": "n-5"}]}]}, "wireframe": {"userflowVersionId": "uf-1", "device": "desktop", "nav": [{"screenId": "n-2", "label": "서재"}, {"screenId": "n-3", "label": "검색"}], "screens": [{"id": "n-2", "title": "홈 / 서재", "elements": [{"type": "heading", "text": "내 서재"}, {"type": "text", "text": "올해 읽은 책 12권 · 진행 중 2권"}, {"type": "button", "text": "+ 책 추가", "variant": "primary", "linkTo": "n-3"}, {"type": "list", "items": [{"text": "데미안 · 80%", "linkTo": "n-4"}, {"text": "사피엔스 · 35%", "linkTo": "n-4"}]}]}, {"id": "n-3", "title": "책 검색", "elements": [{"type": "heading", "text": "책 검색"}, {"type": "input", "label": "제목 · 저자 · ISBN", "placeholder": "예: 데미안"}, {"type": "list", "items": [{"text": "데미안 — 헤르만 헤세", "linkTo": "n-4"}, {"text": "수레바퀴 아래서 — 헤르만 헤세", "linkTo": "n-4"}]}]}, {"id": "n-4", "title": "책 상세 / 기록", "elements": [{"type": "heading", "text": "데미안"}, {"type": "text", "text": "헤르만 헤세 · 1919"}, {"type": "image", "text": "표지", "height": 140}, {"type": "input", "label": "한 줄 감상", "placeholder": "기억하고 싶은 문장이나 느낌"}, {"type": "button", "text": "기록 저장", "variant": "primary", "linkTo": "n-2"}, {"type": "button", "text": "취소", "variant": "ghost", "linkTo": "n-2"}]}]}};
const $ = (s,r=document)=>r.querySelector(s);
if(!PROJECT.features||!Array.isArray(PROJECT.features.requirements))PROJECT.features={requirements:[]};
const data = PROJECT.features;
const roles = (PROJECT.prd && PROJECT.prd.attributes && PROJECT.prd.attributes.roles) || [];
const roleName = id => (roles.find(r=>r.id===id)||{}).name || "—";
const STATUS = {todo:'시작전',doing:'진행중',done:'완료'};
const IMP = {low:'낮음',medium:'보통',high:'높음'};
$("#pname").textContent = (PROJECT.meta && PROJECT.meta.productName) || "기능명세서";

let selReq = data.requirements[0] ? data.requirements[0].id : null;
let sel = null;                       // {type:'feature',id} | {type:'spec',id,featId}
const openFeat = new Set();
const byOrder = a => [...a].sort((x,y)=>(x.order??0)-(y.order??0));
const reqById = id => data.requirements.find(r=>r.id===id);
const featById = (req,id) => req && req.features.find(f=>f.id===id);

function selectedFeature(){const req=reqById(selReq);if(!sel||!req)return null;
  if(sel.type==='feature')return featById(req,sel.id);
  if(sel.type==='spec')return featById(req,sel.featId);return null;}
function selectedSpec(){if(!sel||sel.type!=='spec')return null;const f=selectedFeature();return f&&f.specs.find(s=>s.id===sel.id);}

/* ---------- column 1: requirements ---------- */
function renderReqs(){
  const ul = $("#reqList"); ul.innerHTML="";
  byOrder(data.requirements).forEach((r,i)=>{
    const li=document.createElement("li");
    li.dataset.id=r.id;
    li.className="row "+(r.id===selReq?"sel":"")+" mx-2 px-2 py-2 rounded-md flex items-center gap-2 hover:bg-zinc-50";
    li.innerHTML=`<span class="grab text-zinc-300">⠿</span>
      <span class="text-violet-600 text-sm w-4">${i+1}</span>
      <span class="label flex-1 text-sm truncate">${esc(r.title)}</span>
      <span class="badge">${r.features.length}</span>
      <span class="del-x" title="삭제">✕</span>`;
    li.onclick=()=>{selReq=r.id;sel=null;renderAll();};
    li.querySelector(".label").ondblclick=e=>{e.stopPropagation();renameInline(e.target,v=>{r.title=v;persist();});};
    li.querySelector(".del-x").onclick=e=>{e.stopPropagation();delReq(r);};
    ul.appendChild(li);
  });
  makeSortable(ul, data.requirements);
}

/* ---------- column 2: features + specs ---------- */
function renderFeats(){
  const ul=$("#featList"); ul.innerHTML="";
  const req=reqById(selReq);
  if(!req){ul.innerHTML='<li class="px-4 py-6 text-sm text-zinc-400">왼쪽에서 요구사항을 선택하세요.</li>';return;}
  if(!req.features.length){ul.innerHTML='<li class="px-4 py-6 text-sm text-zinc-400">아직 기능이 없습니다. 상단 + 로 추가하세요.</li>';}
  byOrder(req.features).forEach((f,i)=>{
    const li=document.createElement("li"); li.dataset.id=f.id; li.className="mb-0.5";
    const open=openFeat.has(f.id);
    const isSel=sel&&sel.type==='feature'&&sel.id===f.id;
    li.innerHTML=`
      <div class="row ${isSel?'sel':''} mx-2 px-2 py-2 rounded-md flex items-center gap-2 hover:bg-zinc-50">
        <span class="grab text-zinc-300">⠿</span>
        <span class="chev ${open?'open':''} text-zinc-400 text-xs">▶</span>
        <span class="text-violet-600 text-sm w-4">${i+1}</span>
        <span class="label flex-1 text-sm truncate">${esc(f.title)}</span>
        <span class="badge">${f.specs.length}</span>
        <span class="del-x" title="삭제">✕</span>
      </div>
      <ul class="specs ${open?'':'hidden'} pl-10 pr-2"></ul>`;
    const head=li.querySelector(".row");
    head.onclick=()=>{sel={type:'feature',id:f.id};openFeat.add(f.id);renderAll();};
    head.querySelector(".grab").onclick=e=>e.stopPropagation();
    head.querySelector(".chev").onclick=e=>{e.stopPropagation();open?openFeat.delete(f.id):openFeat.add(f.id);renderFeats();};
    head.querySelector(".label").ondblclick=e=>{e.stopPropagation();renameInline(e.target,v=>{f.title=v;persist();});};
    head.querySelector(".del-x").onclick=e=>{e.stopPropagation();delFeat(req,f);};
    const sul=li.querySelector(".specs");
    byOrder(f.specs).forEach((s,j)=>{
      const sSel=sel&&sel.type==='spec'&&sel.id===s.id;
      const sli=document.createElement("li");
      sli.dataset.id=s.id;
      sli.className="row "+(sSel?'sel':'')+" flex items-center gap-2 py-1.5 px-2 rounded hover:bg-zinc-50";
      sli.innerHTML=`<span class="grab text-zinc-300 text-xs">⠿</span>
        <span class="text-zinc-400 text-xs w-3">${j+1}</span>
        <span class="label flex-1 text-sm text-zinc-700 truncate">${esc(s.title)}</span>
        <span class="del-x" title="삭제">✕</span>`;
      sli.onclick=()=>{sel={type:'spec',id:s.id,featId:f.id};openFeat.add(f.id);renderAll();};
      sli.querySelector(".grab").onclick=e=>e.stopPropagation();
      sli.querySelector(".label").ondblclick=e=>{e.stopPropagation();renameInline(e.target,v=>{s.title=v;persist();});};
      sli.querySelector(".del-x").onclick=e=>{e.stopPropagation();delSpec(f,s);};
      sul.appendChild(sli);
    });
    const addSpec=document.createElement("li");
    addSpec.className="text-xs text-zinc-400 hover:text-violet-600 cursor-pointer py-1.5 px-2";
    addSpec.textContent="+ 상세 기능 추가";
    addSpec.onclick=()=>{const id=nextId("S");f.specs.push({id,title:"새 상세 기능",order:f.specs.length,description:""});openFeat.add(f.id);sel={type:'spec',id,featId:f.id};persist();renderAll();};
    sul.appendChild(addSpec);
    makeSortable(sul,f.specs);
    ul.appendChild(li);
  });
  makeSortable(ul, req.features);
}

/* ---------- column 3: editable detail ---------- */
const opt=(map,cur)=>Object.entries(map).map(([v,t])=>`<option value="${v}" ${v===cur?'selected':''}>${t}</option>`).join("");
const roleOpt=cur=>`<option value="" ${!cur?'selected':''}>(없음)</option>`+roles.map(r=>`<option value="${r.id}" ${r.id===cur?'selected':''}>${esc(r.name)}</option>`).join("");

function crumb(parts){return `<div class="text-xs text-zinc-400 mb-3 truncate">${parts.map(esc).join(' <span class="text-zinc-300">/</span> ')}</div>`;}

function renderDetail(){
  const box=$("#detail");
  const req=reqById(selReq);
  const spec=selectedSpec();
  const f=selectedFeature();
  if(spec){ renderSpecDetail(box,req,f,spec); return; }
  if(f){ renderFeatDetail(box,req,f); return; }
  box.className="max-w-2xl mx-auto p-8 text-zinc-400 text-sm";
  box.innerHTML="가운데에서 기능 또는 상세 기능을 선택하면 여기에서 상세 내용을 보고 편집할 수 있습니다.";
}

function renderFeatDetail(box,req,f){
  box.className="max-w-2xl mx-auto p-8";
  box.innerHTML=`
    ${crumb([req.title,'기능'])}
    <input id="d-title" class="fld text-xl font-semibold mb-5" value="${esc(f.title)}">
    <div class="grid grid-cols-[90px_1fr] gap-x-3 gap-y-3 text-sm items-center mb-6">
      <label class="text-zinc-400">ID</label><div class="text-zinc-500">${f.id}</div>
      <label class="text-zinc-400">담당 역할</label><select id="d-role" class="fld">${roleOpt(f.roleId)}</select>
      <label class="text-zinc-400">상태</label><select id="d-status" class="fld">${opt(STATUS,f.status||'todo')}</select>
      <label class="text-zinc-400">중요도</label><select id="d-imp" class="fld">${opt(IMP,f.importance||'medium')}</select>
    </div>
    <h3 class="text-sm text-zinc-400 mb-1">설명</h3>
    <textarea id="d-desc" rows="4" class="fld mb-6 leading-relaxed" placeholder="이 기능이 무엇을 하는지 설명하세요.">${esc(f.description||"")}</textarea>
    <div class="flex items-center justify-between mb-2">
      <h3 class="text-sm text-zinc-400">수용 기준</h3>
      <button id="d-add-ac" class="text-xs text-violet-600 hover:underline">+ 추가</button>
    </div>
    <ul id="d-ac" class="space-y-2"></ul>
    <div class="mt-8 pt-4 border-t border-zinc-100">
      <button id="d-del" class="text-sm text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-md">기능 삭제</button>
    </div>`;
  $("#d-title").oninput=e=>{f.title=e.target.value;persist();setLabel(f.id,e.target.value);};
  $("#d-role").onchange=e=>{f.roleId=e.target.value||null;persist();};
  $("#d-status").onchange=e=>{f.status=e.target.value;persist();};
  $("#d-imp").onchange=e=>{f.importance=e.target.value;persist();};
  $("#d-desc").oninput=e=>{f.description=e.target.value;persist();};
  $("#d-del").onclick=()=>delFeat(req,f);
  $("#d-add-ac").onclick=()=>{f.acceptanceCriteria=f.acceptanceCriteria||[];f.acceptanceCriteria.push({text:"",done:false});persist();renderAcList(f);const inps=$("#d-ac").querySelectorAll("input.ac-text");inps[inps.length-1]?.focus();};
  renderAcList(f);
}

function renderAcList(f){
  const ul=$("#d-ac"); if(!ul)return; ul.innerHTML="";
  (f.acceptanceCriteria||[]).forEach((c,i)=>{
    const li=document.createElement("li");
    li.className="flex items-start gap-2 text-sm border border-zinc-100 rounded-md px-2 py-1.5 group";
    li.innerHTML=`<input type="checkbox" ${c.done?'checked':''} class="mt-2 ac-done">
      <input class="ac-text fld border-0 shadow-none focus:shadow-none px-1 ${c.done?'line-through text-zinc-400':''}" value="${esc(c.text)}" placeholder="수용 기준을 입력하세요.">
      <span class="del-x opacity-100 mt-1.5">✕</span>`;
    li.querySelector(".ac-done").onchange=e=>{c.done=e.target.checked;persist();li.querySelector(".ac-text").classList.toggle("line-through",c.done);li.querySelector(".ac-text").classList.toggle("text-zinc-400",c.done);};
    li.querySelector(".ac-text").oninput=e=>{c.text=e.target.value;persist();};
    li.querySelector(".del-x").onclick=()=>{f.acceptanceCriteria.splice(i,1);persist();renderAcList(f);};
    ul.appendChild(li);
  });
  if(!(f.acceptanceCriteria||[]).length)ul.innerHTML='<li class="text-xs text-zinc-400 px-1">아직 수용 기준이 없습니다.</li>';
}

function renderSpecDetail(box,req,f,s){
  box.className="max-w-2xl mx-auto p-8";
  box.innerHTML=`
    ${crumb([req.title,f.title,'상세 기능'])}
    <input id="d-title" class="fld text-xl font-semibold mb-5" value="${esc(s.title)}">
    <div class="grid grid-cols-[90px_1fr] gap-x-3 gap-y-3 text-sm items-center mb-6">
      <label class="text-zinc-400">ID</label><div class="text-zinc-500">${s.id}</div>
    </div>
    <h3 class="text-sm text-zinc-400 mb-1">상세 명세</h3>
    <textarea id="d-desc" rows="6" class="fld leading-relaxed" placeholder="개발·디자인의 직접 기준이 되는 세부 동작·정책을 기술하세요.">${esc(s.description||"")}</textarea>
    <div class="mt-8 pt-4 border-t border-zinc-100">
      <button id="d-del" class="text-sm text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-md">상세 기능 삭제</button>
    </div>`;
  $("#d-title").oninput=e=>{s.title=e.target.value;persist();setLabel(s.id,e.target.value);};
  $("#d-desc").oninput=e=>{s.description=e.target.value;persist();};
  $("#d-del").onclick=()=>delSpec(f,s);
}

/* update a left-list label live without rebuilding (keeps input focus) */
function setLabel(id,text){
  document.querySelectorAll(`li[data-id="${id}"] > .row > .label, li[data-id="${id}"] > .label, #reqList li[data-id="${id}"] .label`)
    .forEach(el=>el.textContent=text);
}

/* ---------- delete ---------- */
function delReq(r){
  if(r.features.length && !confirm(`'${r.title}' 요구사항과 하위 기능 ${r.features.length}개를 삭제할까요?`))return;
  data.requirements=data.requirements.filter(x=>x.id!==r.id);
  if(selReq===r.id){selReq=data.requirements[0]?.id||null;sel=null;}
  persist();renderAll();
}
function delFeat(req,f){
  if((f.specs.length||(f.acceptanceCriteria||[]).length) && !confirm(`'${f.title}' 기능을 삭제할까요?`))return;
  req.features=req.features.filter(x=>x.id!==f.id);
  if(sel&&(sel.id===f.id||sel.featId===f.id))sel=null;
  persist();renderAll();
}
function delSpec(f,s){
  f.specs=f.specs.filter(x=>x.id!==s.id);
  if(sel&&sel.type==='spec'&&sel.id===s.id)sel={type:'feature',id:f.id};
  persist();renderAll();
}

function renderAll(){renderReqs();renderFeats();renderDetail();}

function makeSortable(ul, model){
  new Sortable(ul,{handle:".grab",animation:120,onEnd:()=>{
    [...ul.children].filter(li=>li.dataset.id).forEach((li,idx)=>{
      const item=model.find(m=>m.id===li.dataset.id);
      if(item) item.order=idx;
    });
    persist();renderAll();
  }});
}

function renameInline(span,save){
  const cur=span.textContent;
  const inp=document.createElement("input");
  inp.value=cur; inp.className="w-full text-sm border border-violet-300 rounded px-1";
  span.replaceWith(inp); inp.focus(); inp.select();
  inp.onclick=e=>e.stopPropagation();
  const done=()=>{const v=inp.value.trim()||cur;save(v);renderAll();};
  inp.onblur=done; inp.onkeydown=e=>{if(e.key==="Enter")inp.blur();if(e.key==="Escape"){inp.value=cur;inp.blur();}};
}

let idc=Date.now();
function nextId(p){return `${p}-${(++idc).toString(36)}`;}
function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

$("#addReq").onclick=()=>{const id=nextId("R");data.requirements.push({id,title:"새 요구사항",order:data.requirements.length,features:[]});selReq=id;sel=null;persist();renderAll();};
$("#addFeat").onclick=()=>{const req=reqById(selReq);if(!req){alert("먼저 요구사항을 선택하세요.");return;}const id=nextId("F");req.features.push({id,title:"새 기능",order:req.features.length,roleId:roles[0]?.id||null,status:"todo",importance:"medium",description:"",acceptanceCriteria:[],specs:[]});sel={type:'feature',id};persist();renderAll();};

// shared persistence — whole project under one key so all timplay pages stay in sync
const LS="timplay:project:"+((PROJECT.meta&&PROJECT.meta.slug)||"default");
function stamp(){(PROJECT.meta=PROJECT.meta||{}).updatedAt=Date.now();}
function rev(o){return (o&&o.meta&&o.meta.updatedAt)||0;}
function persist(){try{stamp();localStorage.setItem(LS,JSON.stringify(PROJECT));}catch(e){}}
function syncFromShared(o){ // replace each stage's contents in place (keeps `data`/alias references valid)
  if(!o)return false;
  for(const k of ['meta','prd','features','userflow','wireframe']){
    if(o[k]==null)continue;
    const cur=PROJECT[k], val=o[k];
    if(cur&&typeof cur==='object'&&!Array.isArray(cur)&&typeof val==='object'&&!Array.isArray(val)){for(const kk of Object.keys(cur))delete cur[kk];Object.assign(cur,val);}
    else PROJECT[k]=val;
  }
  if(!PROJECT.features||typeof PROJECT.features!=='object')PROJECT.features={requirements:[]};
  if(!Array.isArray(PROJECT.features.requirements))PROJECT.features.requirements=[];  // mutate in place — keeps `data` alias valid
  return true;
}
// Adopt the stored copy only when it is at least as fresh as this page's embedded
// data — stops a stale localStorage value from clobbering a freshly rendered file.
(function restore(){try{const s=localStorage.getItem(LS);if(s){const o=JSON.parse(s);if(rev(o)>=rev(PROJECT)){syncFromShared(o);if(!reqById(selReq))selReq=data.requirements[0]?.id||null;}}}catch(e){}})();
window.addEventListener("storage",e=>{ // another timplay page (or tab) changed the project
  if(e.key!==LS||!e.newValue)return;
  try{const o=JSON.parse(e.newValue);if(rev(o)>=rev(PROJECT)){syncFromShared(o);if(!reqById(selReq))selReq=data.requirements[0]?.id||null;renderAll();}}catch(err){}
});
// save/load: overwrite the SAME project.json in place when supported (Chromium + secure context),
// otherwise fall back to a normal download. Importing also binds that file for future saves.
const SLUG=(PROJECT.meta&&PROJECT.meta.slug)||"project";
const FSA="showSaveFilePicker" in window;
let fileHandle=null;
const idb={open(){return new Promise(res=>{let r;try{r=indexedDB.open("timplay",1);}catch(e){return res(null);}r.onupgradeneeded=()=>r.result.createObjectStore("handles");r.onsuccess=()=>res(r.result);r.onerror=()=>res(null);});},
  async get(k){const db=await this.open();if(!db)return null;return new Promise(res=>{try{const t=db.transaction("handles").objectStore("handles").get(k);t.onsuccess=()=>res(t.result||null);t.onerror=()=>res(null);}catch(e){res(null);}});},
  async set(k,v){const db=await this.open();if(!db)return;try{db.transaction("handles","readwrite").objectStore("handles").put(v,k);}catch(e){}}};
async function perm(h){if(!h.queryPermission)return true;if(await h.queryPermission({mode:"readwrite"})==="granted")return true;return (await h.requestPermission({mode:"readwrite"}))==="granted";}
function flashSaved(msg){const b=$("#export");if(!b.dataset.t)b.dataset.t=b.textContent;b.textContent="✓ "+msg;setTimeout(()=>{b.textContent=b.dataset.t;},1200);}
function applyImport(text){try{const o=JSON.parse(text);if(typeof o!=="object"||o===null||Array.isArray(o))throw new Error("최상위가 JSON 객체가 아닙니다");if("features"in o&&o.features&&!Array.isArray(o.features.requirements))throw new Error("features.requirements가 배열이 아닙니다");syncFromShared(o);if(!reqById(selReq))selReq=data.requirements[0]?.id||null;sel=null;persist();renderAll();}catch(err){alert("불러오기 실패: "+err.message);}}
async function doExport(){
  const text=JSON.stringify(PROJECT,null,2);
  if(FSA){try{
    if(!fileHandle)fileHandle=await idb.get("file:"+SLUG);
    if(fileHandle&&!(await perm(fileHandle)))fileHandle=null;
    if(!fileHandle){fileHandle=await window.showSaveFilePicker({suggestedName:SLUG+".json",types:[{description:"JSON",accept:{"application/json":[".json"]}}]});await idb.set("file:"+SLUG,fileHandle);}
    const w=await fileHandle.createWritable();await w.write(text);await w.close();flashSaved("저장됨");return;
  }catch(err){if(err&&err.name==="AbortError")return;}}
  const blob=new Blob([text],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=SLUG+".json";a.click();
}
async function doImport(){
  if(FSA){try{const [h]=await window.showOpenFilePicker({types:[{description:"JSON",accept:{"application/json":[".json"]}}]});fileHandle=h;await idb.set("file:"+SLUG,h);applyImport(await (await h.getFile()).text());return;}catch(err){if(err&&err.name==="AbortError")return;}}
  $("#file").click();
}
$("#export").onclick=doExport;
$("#import").onclick=doImport;
$("#file").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>applyImport(r.result);r.readAsText(f);};

renderAll();
</script>
