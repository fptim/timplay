<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>와이어프레임</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{font-family:Inter,system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif}
  /* shadcn-ish tokens */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;height:2.25rem;padding:0 .9rem;
    border-radius:.5rem;font-size:.875rem;font-weight:500;cursor:pointer;transition:.12s}
  .btn-primary{background:#18181b;color:#fff}.btn-primary:hover{background:#27272a}
  .btn-secondary{background:#f4f4f5;color:#18181b}.btn-secondary:hover{background:#e4e4e7}
  .btn-ghost{background:transparent;color:#18181b}.btn-ghost:hover{background:#f4f4f5}
  .btn-destructive{background:#dc2626;color:#fff}.btn-destructive:hover{background:#b91c1c}
  .inp{width:100%;height:2.25rem;border:1px solid #e4e4e7;border-radius:.5rem;padding:0 .75rem;font-size:.875rem}
  .card{border:1px solid #e4e4e7;border-radius:.75rem;padding:1rem;background:#fff}
</style>
</head>
<body class="bg-zinc-50 text-zinc-900">
<header class="h-14 border-b border-zinc-200 bg-white flex items-center px-4 gap-3 sticky top-0 z-20">
  <span class="w-6 h-6 rounded bg-violet-600"></span>
  <span id="pname" class="font-medium truncate"></span>
  <nav class="ml-3 flex items-center gap-1 text-sm text-zinc-400">
    <a href="prd.md" class="px-2 py-1 rounded hover:bg-zinc-100">PRD</a><span>·</span>
    <a href="features.html" class="px-2 py-1 rounded hover:bg-zinc-100">기능명세서</a><span>·</span>
    <a href="userflow.html" class="px-2 py-1 rounded hover:bg-zinc-100">유저플로우</a><span>·</span>
    <a href="wireframe.html" class="px-2 py-1 rounded bg-zinc-100 text-zinc-900 font-medium">와이어프레임</a>
  </nav>
  <div class="ml-auto flex items-center gap-2">
    <div class="flex rounded-md border border-zinc-200 overflow-hidden text-sm">
      <button id="dtDesktop" class="px-3 py-1.5">데스크탑</button>
      <button id="dtMobile" class="px-3 py-1.5 border-l border-zinc-200">모바일</button>
    </div>
    <input id="file" type="file" accept="application/json" class="hidden">
    <button id="import" class="text-sm px-3 py-1.5 rounded-md border border-zinc-200 hover:bg-zinc-50">불러오기</button>
    <button id="export" class="text-sm px-3 py-1.5 rounded-md bg-violet-600 text-white hover:bg-violet-700">내보내기</button>
  </div>
</header>

<div class="flex h-[calc(100vh-3.5rem)]">
  <aside class="w-56 border-r border-zinc-200 bg-white p-3 overflow-auto">
    <h2 class="text-xs font-medium text-zinc-400 px-2 mb-2">화면 목록</h2>
    <ul id="screenList" class="space-y-0.5"></ul>
  </aside>
  <div class="flex-1 overflow-auto grid place-items-center p-8 bg-zinc-100">
    <div id="frame"></div>
  </div>
</div>

<script>
const PROJECT={"meta": {"productName": "초보 독자를 위한 독서 기록 앱", "slug": "reading-tracker", "language": "ko", "createdAt": "2026-06-24", "updatedAt": 1782302500595}, "prd": {"overview": {"oneLiner": "읽은 책을 쉽게 기록하고 독서 습관을 이어가도록 돕는 초보 독자용 앱", "goals": ["검색 한 번으로 책 정보를 자동 입력해 기록 마찰을 없앤다", "진척도와 통계로 독서 동기를 유지한다", "첫 4주 재방문율을 끌어올린다"], "background": "초보 독자는 기록을 시작해도 입력이 번거로워 금방 그만둔다. 가벼운 자동화로 습관 형성을 돕는다."}, "coreValue": {"problem": "책을 읽어도 기록이 귀찮아 흐지부지되고, 무엇을 얼마나 읽었는지 남지 않는다.", "solution": "ISBN·제목 검색으로 표지·저자를 자동 채우고, 별점·짧은 감상만으로 1분 안에 기록을 마친다.", "differentiation": "범용 메모앱과 달리 독서에 특화된 자동 입력과 진척도 통계를 기본 제공한다."}, "targetScenario": {"userGroups": [{"name": "초보 독자", "description": "한 달 1~2권, 기록 습관이 없고 입력 마찰에 민감"}, {"name": "기록 애호가", "description": "통계·회고를 즐기며 데이터를 꾸준히 남김"}], "scenarios": [{"title": "첫 기록", "story": "앱을 켜고 방금 다 읽은 책을 제목으로 검색해 선택하면 정보가 자동 입력된다. 별점과 한 줄 감상을 남기고 저장하면 서재에 첫 책이 꽂힌다."}]}, "metrics": {"kpis": [{"name": "4주 재방문율", "target": "35% 이상"}, {"name": "첫 기록까지 시간", "target": "설치 후 3분 이내"}], "risks": ["책 메타데이터 검색 정확도", "초기 빈 화면의 동기 부여 부족"], "openIssues": ["전자책 연동 범위", "소셜 공유 우선순위"]}, "attributes": {"category": "라이프스타일 / 생산성", "roles": [{"id": "reader", "name": "독자"}, {"id": "admin", "name": "관리자"}], "environments": ["web", "ios"]}}, "features": {"requirements": [{"id": "R-1", "title": "책 검색 및 기록", "order": 0, "features": [{"id": "F-1", "title": "책 검색 기능", "order": 0, "roleId": "reader", "status": "todo", "importance": "high", "description": "제목·저자·ISBN으로 책을 검색하고 선택하면 표지·저자 등 기본 정보가 자동 입력된다.", "acceptanceCriteria": [{"text": "제목·저자·ISBN으로 검색할 수 있다", "done": false}, {"text": "검색 결과 선택 시 기본 정보가 자동 입력된다", "done": false}], "specs": [{"id": "S-1", "title": "책 상세 정보 조회", "order": 0, "description": "선택한 책의 표지·저자·출간일·소개를 상세 화면에 보여준다."}, {"id": "S-2", "title": "검색 자동완성", "order": 1, "description": "두 글자 이상 입력 시 후보를 자동완성으로 제안한다."}]}, {"id": "F-2", "title": "감상 및 별점 기록", "order": 1, "roleId": "reader", "status": "todo", "importance": "medium", "description": "책마다 별점과 짧은 감상을 남기고 언제든 편집한다.", "acceptanceCriteria": [{"text": "0.5 단위 별점을 줄 수 있다", "done": false}], "specs": [{"id": "S-3", "title": "감상 자동 저장", "order": 0, "description": "입력 중 자동 저장되어 이탈해도 유실되지 않는다."}]}]}, {"id": "R-2", "title": "독서 진척도 및 통계", "order": 1, "features": [{"id": "F-3", "title": "진척도 기록", "order": 0, "roleId": "reader", "status": "todo", "importance": "high", "description": "읽기 시작일·완료일과 현재 페이지를 기록해 진행률을 보여준다.", "acceptanceCriteria": [{"text": "현재 페이지로 진행률(%)이 계산된다", "done": false}], "specs": []}]}]}, "userflow": {"activeVersionId": "uf-1", "versions": [{"id": "uf-1", "name": "기본 플로우", "createdAt": "2026-06-24", "parentId": null, "sections": [{"id": "sec-1", "title": "온보딩", "order": 0}, {"id": "sec-2", "title": "서재", "order": 1}], "nodes": [{"id": "n-1", "type": "start", "label": "시작", "sectionId": "sec-1", "x": 40, "y": 70}, {"id": "n-2", "type": "sectionTop", "label": "홈 / 서재", "sectionId": "sec-2", "x": 260, "y": 70, "ref": {"type": "feature", "id": "F-3"}}, {"id": "n-3", "type": "page", "label": "책 검색", "sectionId": "sec-2", "x": 500, "y": 30, "ref": {"type": "feature", "id": "F-1"}}, {"id": "n-4", "type": "page", "label": "책 상세 / 기록", "sectionId": "sec-2", "x": 500, "y": 150, "ref": {"type": "spec", "id": "S-1"}}, {"id": "n-5", "type": "action", "label": "기록 저장", "sectionId": "sec-2", "x": 740, "y": 150}], "edges": [{"id": "e-1", "from": "n-1", "to": "n-2"}, {"id": "e-2", "from": "n-2", "to": "n-3"}, {"id": "e-3", "from": "n-3", "to": "n-4"}, {"id": "e-4", "from": "n-4", "to": "n-5"}]}]}, "wireframe": {"userflowVersionId": "uf-1", "device": "desktop", "nav": [{"screenId": "n-2", "label": "서재"}, {"screenId": "n-3", "label": "검색"}], "screens": [{"id": "n-2", "title": "홈 / 서재", "elements": [{"type": "heading", "text": "내 서재"}, {"type": "text", "text": "올해 읽은 책 12권 · 진행 중 2권"}, {"type": "button", "text": "+ 책 추가", "variant": "primary", "linkTo": "n-3"}, {"type": "list", "items": [{"text": "데미안 · 80%", "linkTo": "n-4"}, {"text": "사피엔스 · 35%", "linkTo": "n-4"}]}]}, {"id": "n-3", "title": "책 검색", "elements": [{"type": "heading", "text": "책 검색"}, {"type": "input", "label": "제목 · 저자 · ISBN", "placeholder": "예: 데미안"}, {"type": "list", "items": [{"text": "데미안 — 헤르만 헤세", "linkTo": "n-4"}, {"text": "수레바퀴 아래서 — 헤르만 헤세", "linkTo": "n-4"}]}]}, {"id": "n-4", "title": "책 상세 / 기록", "elements": [{"type": "heading", "text": "데미안"}, {"type": "text", "text": "헤르만 헤세 · 1919"}, {"type": "image", "text": "표지", "height": 140}, {"type": "input", "label": "한 줄 감상", "placeholder": "기억하고 싶은 문장이나 느낌"}, {"type": "button", "text": "기록 저장", "variant": "primary", "linkTo": "n-2"}, {"type": "button", "text": "취소", "variant": "ghost", "linkTo": "n-2"}]}]}};
const $=(s,r=document)=>r.querySelector(s);
if(!PROJECT.wireframe||typeof PROJECT.wireframe!=='object')PROJECT.wireframe={device:"desktop",nav:[],screens:[]};
if(!Array.isArray(PROJECT.wireframe.screens))PROJECT.wireframe.screens=[];
if(!Array.isArray(PROJECT.wireframe.nav))PROJECT.wireframe.nav=[];
const wf=PROJECT.wireframe;
$("#pname").textContent=(PROJECT.meta&&PROJECT.meta.productName)||"와이어프레임";
let device=wf.device||"desktop";
let current=wf.screens[0]?.id;
const screenById=id=>wf.screens.find(s=>s.id===id);

function el(node){
  switch(node.type){
    case "heading": return `<h2 class="text-xl font-semibold mb-1">${esc(node.text)}</h2>`;
    case "text":    return `<p class="text-sm text-zinc-500 mb-1">${esc(node.text)}</p>`;
    case "divider": return `<hr class="my-3 border-zinc-200">`;
    case "input":   return `<label class="block text-sm mb-3"><span class="text-zinc-600 mb-1 block">${esc(node.label||"")}</span>
                      <input class="inp" type="${esc(node.inputType||'text')}" placeholder="${esc(node.placeholder||'')}"></label>`;
    case "image":   return `<div class="rounded-lg bg-zinc-100 border border-dashed border-zinc-300 grid place-items-center text-zinc-400 text-xs mb-3" style="height:${parseInt(node.height,10)||120}px">${esc(node.text||'이미지')}</div>`;
    case "button":  return `<button class="btn btn-${esc(node.variant||'secondary')} mb-2 mr-2" ${node.linkTo?`data-link="${esc(node.linkTo)}"`:""}>${esc(node.text)}</button>`;
    case "list":    return `<ul class="divide-y divide-zinc-100 border border-zinc-200 rounded-lg mb-3">${
                      (node.items||[]).map(it=>`<li class="px-3 py-2.5 text-sm flex justify-between items-center ${it.linkTo?'cursor-pointer hover:bg-zinc-50':''}" ${it.linkTo?`data-link="${esc(it.linkTo)}"`:""}><span>${esc(it.text)}</span>${it.linkTo?'<span class="text-zinc-300">›</span>':''}</li>`).join("")}</ul>`;
    case "card":    return `<div class="card mb-3 ${node.linkTo?'cursor-pointer hover:border-zinc-300':''}" ${node.linkTo?`data-link="${esc(node.linkTo)}"`:""}>
                      ${node.title?`<div class="font-medium mb-1">${esc(node.title)}</div>`:""}
                      <div class="text-sm text-zinc-500">${esc(node.text||"")}</div></div>`;
    default: return "";
  }
}

function screenBody(s){
  return `<div class="space-y-0">${(s.elements||[]).map(el).join("")}</div>`;
}

function render(){
  $("#dtDesktop").className="px-3 py-1.5"+(device==="desktop"?" bg-zinc-900 text-white":"");
  $("#dtMobile").className="px-3 py-1.5 border-l border-zinc-200"+(device==="mobile"?" bg-zinc-900 text-white":"");
  // screen list
  const sl=$("#screenList"); sl.innerHTML="";
  wf.screens.forEach(s=>{
    const li=document.createElement("li");
    li.className="px-2 py-1.5 rounded text-sm cursor-pointer truncate "+(s.id===current?"bg-violet-50 text-violet-700":"hover:bg-zinc-50");
    li.textContent=s.title; li.onclick=()=>{current=s.id;render();};
    sl.appendChild(li);
  });
  const s=screenById(current)||wf.screens[0]; if(!s){$("#frame").innerHTML='<div class="text-sm text-zinc-400 p-8">화면이 없습니다. 유저플로우의 페이지 노드에서 와이어프레임을 생성하세요.</div>';return;}
  const nav=(wf.nav||[]);
  if(device==="desktop"){
    $("#frame").innerHTML=`
    <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-zinc-200" style="width:960px;height:620px;display:flex;flex-direction:column">
      <div class="h-12 border-b border-zinc-200 flex items-center px-4 gap-4 shrink-0">
        <span class="w-5 h-5 rounded bg-violet-600"></span>
        <span class="font-medium text-sm">${esc((PROJECT.meta&&PROJECT.meta.productName)||"")}</span>
        <div class="ml-auto flex gap-3 text-sm text-zinc-500">${nav.map(n=>`<span class="cursor-pointer hover:text-zinc-900" data-link="${esc(n.screenId)}">${esc(n.label)}</span>`).join("")}</div>
      </div>
      <div class="flex flex-1 min-h-0">
        <div class="w-48 border-r border-zinc-200 p-3 space-y-1 shrink-0">
          ${nav.map(n=>`<div class="px-2 py-1.5 rounded text-sm cursor-pointer ${n.screenId===current?'bg-zinc-100 font-medium':'text-zinc-500 hover:bg-zinc-50'}" data-link="${esc(n.screenId)}">${esc(n.label)}</div>`).join("")}
        </div>
        <div class="flex-1 overflow-auto p-6">
          <h1 class="text-lg font-semibold mb-4 text-zinc-400">${esc(s.title)}</h1>
          ${screenBody(s)}
        </div>
      </div>
    </div>`;
  } else {
    $("#frame").innerHTML=`
    <div class="bg-white rounded-[2rem] shadow-lg border-[6px] border-zinc-900 overflow-hidden" style="width:340px;height:680px;display:flex;flex-direction:column">
      <div class="h-10 flex items-center justify-center text-xs text-zinc-400 shrink-0">${esc(s.title)}</div>
      <div class="flex-1 overflow-auto px-4 pb-4">${screenBody(s)}</div>
      <div class="h-14 border-t border-zinc-200 flex items-center justify-around shrink-0">
        ${(nav.length?nav:wf.screens.slice(0,4).map(x=>({screenId:x.id,label:x.title}))).slice(0,5).map(n=>`
          <div class="flex flex-col items-center text-[10px] cursor-pointer ${n.screenId===current?'text-violet-600':'text-zinc-400'}" data-link="${esc(n.screenId)}">
            <span class="w-5 h-5 rounded ${n.screenId===current?'bg-violet-600':'bg-zinc-300'} mb-0.5"></span>${esc(n.label)}</div>`).join("")}
      </div>
    </div>`;
  }
  // wire up navigation
  $("#frame").querySelectorAll("[data-link]").forEach(b=>b.onclick=e=>{
    e.stopPropagation();const t=b.getAttribute("data-link");
    if(screenById(t)){current=t;render();}
  });
}

function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
$("#dtDesktop").onclick=()=>{device="desktop";wf.device=device;persist();render();};
$("#dtMobile").onclick=()=>{device="mobile";wf.device=device;persist();render();};

const LS="timplay:project:"+((PROJECT.meta&&PROJECT.meta.slug)||"default");
function stamp(){(PROJECT.meta=PROJECT.meta||{}).updatedAt=Date.now();}
function rev(o){return (o&&o.meta&&o.meta.updatedAt)||0;}
function persist(){try{stamp();localStorage.setItem(LS,JSON.stringify(PROJECT));}catch(e){}}
function syncFromShared(o){ // replace each stage's contents in place (keeps `wf` alias valid)
  if(!o)return false;
  for(const k of ['meta','prd','features','userflow','wireframe']){
    if(o[k]==null)continue;
    const cur=PROJECT[k], val=o[k];
    if(cur&&typeof cur==='object'&&!Array.isArray(cur)&&typeof val==='object'&&!Array.isArray(val)){for(const kk of Object.keys(cur))delete cur[kk];Object.assign(cur,val);}
    else PROJECT[k]=val;
  }
  if(!Array.isArray(wf.screens))wf.screens=[]; if(!Array.isArray(wf.nav))wf.nav=[];  // mutate in place — keeps `wf` alias valid
  device=wf.device||device; if(!screenById(current))current=wf.screens[0]?.id;
  return true;
}
(function restore(){try{const s=localStorage.getItem(LS);if(s){const o=JSON.parse(s);if(rev(o)>=rev(PROJECT))syncFromShared(o);}}catch(e){}})();
window.addEventListener("storage",e=>{if(e.key!==LS||!e.newValue)return;try{const o=JSON.parse(e.newValue);if(rev(o)>=rev(PROJECT)){syncFromShared(o);render();}}catch(err){}});
// save/load: overwrite the SAME project.json in place when supported, else download.
const SLUG=(PROJECT.meta&&PROJECT.meta.slug)||"project";
const FSA="showSaveFilePicker" in window;
let fileHandle=null;
const idb={open(){return new Promise(res=>{let r;try{r=indexedDB.open("timplay",1);}catch(e){return res(null);}r.onupgradeneeded=()=>r.result.createObjectStore("handles");r.onsuccess=()=>res(r.result);r.onerror=()=>res(null);});},
  async get(k){const db=await this.open();if(!db)return null;return new Promise(res=>{try{const t=db.transaction("handles").objectStore("handles").get(k);t.onsuccess=()=>res(t.result||null);t.onerror=()=>res(null);}catch(e){res(null);}});},
  async set(k,v){const db=await this.open();if(!db)return;try{db.transaction("handles","readwrite").objectStore("handles").put(v,k);}catch(e){}}};
async function perm(h){if(!h.queryPermission)return true;if(await h.queryPermission({mode:"readwrite"})==="granted")return true;return (await h.requestPermission({mode:"readwrite"}))==="granted";}
function flashSaved(msg){const b=$("#export");if(!b.dataset.t)b.dataset.t=b.textContent;b.textContent="✓ "+msg;setTimeout(()=>{b.textContent=b.dataset.t;},1200);}
function applyImport(text){try{const o=JSON.parse(text);if(typeof o!=="object"||o===null||Array.isArray(o))throw new Error("최상위가 JSON 객체가 아닙니다");if("wireframe"in o&&o.wireframe&&!Array.isArray(o.wireframe.screens))throw new Error("wireframe.screens가 배열이 아닙니다");syncFromShared(o);persist();render();}catch(err){alert("불러오기 실패: "+err.message);}}
async function doExport(){
  const text=JSON.stringify(PROJECT,null,2);
  if(FSA){try{
    if(!fileHandle)fileHandle=await idb.get("file:"+SLUG);
    if(fileHandle&&!(await perm(fileHandle)))fileHandle=null;
    if(!fileHandle){fileHandle=await window.showSaveFilePicker({suggestedName:SLUG+".json",types:[{description:"JSON",accept:{"application/json":[".json"]}}]});await idb.set("file:"+SLUG,fileHandle);}
    const w=await fileHandle.createWritable();await w.write(text);await w.close();flashSaved("저장됨");return;
  }catch(err){if(err&&err.name==="AbortError")return;}}
  const blob=new Blob([text],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=SLUG+".json";a.click();
}
async function doImport(){
  if(FSA){try{const [h]=await window.showOpenFilePicker({types:[{description:"JSON",accept:{"application/json":[".json"]}}]});fileHandle=h;await idb.set("file:"+SLUG,h);applyImport(await (await h.getFile()).text());return;}catch(err){if(err&&err.name==="AbortError")return;}}
  $("#file").click();
}
$("#export").onclick=doExport;
$("#import").onclick=doImport;
